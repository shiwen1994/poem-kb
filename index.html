<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>唐诗宋词 · 知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","PingFang SC","Microsoft YaHei",serif;background:#0d0d14;color:#e8d5b0;min-height:100vh}

/* 头部 */
header{text-align:center;padding:40px 20px 20px;background:linear-gradient(180deg,#1a1520 0%,#0d0d14 100%);border-bottom:1px solid rgba(212,168,67,0.15)}
header h1{font-size:26px;font-weight:300;color:#d4a843;letter-spacing:8px;margin-bottom:6px}
header p{font-size:12px;color:#666;letter-spacing:2px}

/* 统计条 */
.stats-bar{display:flex;justify-content:center;gap:32px;padding:12px 20px;background:rgba(212,168,67,0.06);font-size:13px;color:#888;margin-bottom:0}
.stats-bar span{color:#d4a843}

/* Tab导航 */
.tabs{display:flex;border-bottom:1px solid rgba(212,168,67,0.15);background:#0d0d14;position:sticky;top:0;z-index:100;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:14px 8px;text-align:center;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}
.tab:hover{color:#d4a843}
.tab.active{color:#d4a843;border-bottom-color:#d4a843;background:rgba(212,168,67,0.06)}

/* 页面容器 */
.page{display:none;padding:20px;max-width:1200px;margin:0 auto;min-height:calc(100vh - 160px)}
.page.active{display:block}

/* 搜索区 */
.search-wrap{max-width:640px;margin:20px auto 28px}
.search-box{display:flex;gap:10px}
#searchInput{flex:1;padding:13px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(212,168,67,0.25);border-radius:30px;color:#e8d5b0;font-size:15px;outline:none;transition:border-color 0.2s}
#searchInput:focus{border-color:#d4a843}
#searchInput::placeholder{color:#555}
.filters{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(212,168,67,0.15);border-radius:20px;color:#666;font-size:12px;cursor:pointer;transition:all 0.2s}
.filter-btn:hover,.filter-btn.active{background:rgba(212,168,67,0.15);border-color:#d4a843;color:#d4a843}

/* 结果 */
#resultCount{font-size:13px;color:#555;margin-bottom:14px;padding-left:4px}
.poem-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.poem-card{background:rgba(255,255,255,0.03);border:1px solid rgba(212,168,67,0.1);border-radius:10px;padding:18px;cursor:pointer;transition:all 0.2s}
.poem-card:hover{background:rgba(212,168,67,0.08);border-color:rgba(212,168,67,0.3);transform:translateY(-2px)}
.poem-card .poem-title{font-size:16px;color:#d4a843;margin-bottom:4px}
.poem-card .poem-meta{font-size:12px;color:#666;margin-bottom:8px}
.poem-card .poem-snippet{font-size:14px;color:#999;line-height:1.8;border-left:2px solid rgba(212,168,67,0.2);padding-left:10px;margin:8px 0}
.poem-card .poem-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{padding:2px 8px;background:rgba(196,30,58,0.12);border:1px solid rgba(196,30,58,0.25);border-radius:10px;color:#c41e3a;font-size:11px}

/* 详情弹窗 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;justify-content:center;align-items:center;padding:20px;overflow-y:auto}
.modal.show{display:flex}
.modal-content{background:#16141e;border:1px solid rgba(212,168,67,0.2);border-radius:14px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:28px;position:relative}
.modal-close{position:absolute;top:14px;right:18px;font-size:22px;color:#555;cursor:pointer;line-height:1;background:none;border:none}
.modal-close:hover{color:#d4a843}
.modal-title{font-size:22px;color:#d4a843;margin-bottom:4px}
.modal-author{font-size:14px;color:#888;margin-bottom:18px}
.modal-content-text{font-size:17px;line-height:2.2;color:#e8d5b0;margin:16px 0;letter-spacing:1px}
.modal-section{margin-top:18px;padding-top:16px;border-top:1px solid rgba(212,168,67,0.1)}
.modal-section h4{color:#c41e3a;font-size:13px;margin-bottom:8px;font-weight:400}

/* 图谱页 */
#graphPage{text-align:center}
#graphSvg{width:100%;height:600px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(212,168,67,0.1)}
.graph-hint{font-size:12px;color:#555;margin-top:8px}

/* 时间轴页 */
#timelinePage{overflow-x:auto;padding-bottom:20px}
#timelineSvg{width:100%;min-width:900px;height:400px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(212,168,67,0.1)}

/* 典故页 */
.allusion-search{max-width:500px;margin:0 auto 24px}
.allusion-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.allusion-card{background:rgba(255,255,255,0.03);border:1px solid rgba(212,168,67,0.1);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.2s}
.allusion-card:hover{background:rgba(212,168,67,0.08);border-color:rgba(212,168,67,0.3)}
.allusion-card h4{color:#d4a843;font-size:15px;margin-bottom:6px}
.allusion-card p{font-size:13px;color:#888;line-height:1.7}
.allusion-card .source{color:#555;font-size:12px;margin-top:6px}

/* 地图页 */
#mapPage{padding:10px}
#map{height:calc(100vh - 220px);min-height:500px;border-radius:12px;border:1px solid rgba(212,168,67,0.1)}

/* 诗人弹窗 */
.author-modal .author-name{font-size:24px;color:#d4a843;margin-bottom:4px}
.author-modal .author-dynasty{font-size:13px;color:#c41e3a;margin-bottom:12px}
.author-modal .author-desc{font-size:14px;color:#999;line-height:1.8;margin-bottom:14px}
.author-modal .author-works h4{color:#c41e3a;font-size:13px;margin-bottom:8px;font-weight:400}
.author-modal .author-works{font-size:13px;color:#888}
.author-modal .author-relations{margin-top:12px}
.author-modal .author-relations h4{color:#c41e3a;font-size:13px;margin-bottom:8px;font-weight:400}
.rel-tag{display:inline-block;padding:3px 10px;background:rgba(212,168,67,0.1);border-radius:10px;color:#d4a843;font-size:12px;margin:3px}

/* 加载状态 */
.loading{text-align:center;padding:60px 0;color:#555;font-size:15px}
.loading::after{content:"...";animation:dots 1.5s infinite}
@keyframes dots{0%,20%{content:"."}40%{content:".."}60%,100%{content:"..."}}
.empty{text-align:center;padding:60px 0;color:#444;font-size:14px}

/* 底部 */
footer{text-align:center;padding:24px;font-size:12px;color:#333;border-top:1px solid rgba(212,168,67,0.06);margin-top:40px}
footer a{color:#555;text-decoration:none}
footer a:hover{color:#d4a843}
</style>
</head>
<body>

<header>
  <h1>唐诗宋词 · 知识库</h1>
  <p>78,660 首诗词 · 5,238 位诗人</p>
</header>

<div class="stats-bar">
  <span id="statPoems">加载中…</span>
  <span>·</span>
  <span id="statAuthors">加载中…</span>
  <span>·</span>
  <span>数据基于 chinese-poetry (MIT)</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="searchPage">🔍 搜索</div>
  <div class="tab" data-tab="graphPage">🕸️ 图谱</div>
  <div class="tab" data-tab="timelinePage">📅 时间轴</div>
  <div class="tab" data-tab="allusionPage">📚 典故</div>
  <div class="tab" data-tab="mapPage">🗺️ 地图</div>
</div>

<!-- Tab1: 搜索 -->
<div class="page active" id="searchPage">
  <div class="search-wrap">
    <div class="search-box">
      <input id="searchInput" placeholder="搜索诗人、诗句、地点…" autocomplete="off">
    </div>
    <div class="filters">
      <span class="filter-btn active" data-filter="all">全部</span>
      <span class="filter-btn" data-filter="Tang">唐诗</span>
      <span class="filter-btn" data-filter="Song">宋词</span>
      <span class="filter-btn" data-filter="五言绝句">五言绝句</span>
      <span class="filter-btn" data-filter="七言绝句">七言绝句</span>
      <span class="filter-btn" data-filter="五言律诗">五言律诗</span>
      <span class="filter-btn" data-filter="七言律诗">七言律诗</span>
      <span class="filter-btn" data-filter="词">词牌</span>
      <span class="filter-btn" data-filter="乐府">乐府</span>
    </div>
  </div>
  <div id="resultCount"></div>
  <div class="poem-list" id="poemList"></div>
</div>

<!-- Tab2: 图谱 -->
<div class="page" id="graphPage">
  <div id="graphSvg"></div>
  <p class="graph-hint">拖拽节点 · 滚轮缩放 · 点击查看诗人</p>
</div>

<!-- Tab3: 时间轴 -->
<div class="page" id="timelinePage">
  <div id="timelineSvg"></div>
</div>

<!-- Tab4: 典故 -->
<div class="page" id="allusionPage">
  <div class="allusion-search">
    <input id="allusionSearch" class="search-box" style="width:100%" placeholder="搜索典故…">
  </div>
  <div class="allusion-list" id="allusionList"></div>
</div>

<!-- Tab5: 地图 -->
<div class="page" id="mapPage">
  <div id="map"></div>
</div>

<footer>
  唐诗宋词知识库 · 数据基于 <a href="https://github.com/chinese-poetry/chinese-poetry" target="_blank">chinese-poetry</a> (MIT License) · 
  GitHub: <a href="https://github.com/shiwen1994/poem-kb" target="_blank">shiwen1994/poem-kb</a>
</footer>

<!-- 诗词详情弹窗 -->
<div class="modal" id="poemModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closePoemModal()">×</button>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-author" id="mAuthor"></div>
    <div class="modal-content-text" id="mContent"></div>
    <div class="modal-section" id="mTags"></div>
    <div class="modal-section" id="mAllusions"></div>
  </div>
</div>

<!-- 诗人详情弹窗 -->
<div class="modal" id="authorModal">
  <div class="modal-content author-modal">
    <button class="modal-close" onclick="closeAuthorModal()">×</button>
    <div class="author-name" id="aName"></div>
    <div class="author-dynasty" id="aDynasty"></div>
    <div class="author-desc" id="aDesc"></div>
    <div class="author-relations" id="aRelations"></div>
    <div class="author-works" id="aWorks"></div>
  </div>
</div>

<!-- CDN库 -->
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

<script>
// ═══════════════════════════════════════════════════
// 全局数据
// ═══════════════════════════════════════════════════
let allPoems = [];
let allAuthors = {};
let fuse = null;
let currentFilter = 'all';
let currentQuery = '';
let map = null;
let markerLayer = null;

// ═══════════════════════════════════════════════════
// Tab切换
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.style.cursor = 'pointer';
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const targetId = tab.dataset.tab;
      const target = document.getElementById(targetId);
      if (target) target.classList.add('active');
      if (targetId === 'graphPage') renderGraph();
      if (targetId === 'timelinePage') renderTimeline();
      if (targetId === 'allusionPage') renderAllusions();
      if (targetId === 'mapPage') initMap();
    });
  });
});

// ═══════════════════════════════════════════════════
// 数据加载
// ═══════════════════════════════════════════════════
async function loadData() {
  showLoading();
  try {
    const parts = [];
    for (let i = 1; i <= 6; i++) {
      updateLoading(`加载诗词数据... (${i}/6)`);
      const url = `https://cdn.jsdelivr.net/gh/shiwen1994/poem-kb@main/data/poems_part${i}.json`;
      const r = await fetch(url);
      const d = await r.json();
      parts.push(...d);
    }
    allPoems = parts;

    updateLoading('加载诗人数据...');
    const ar = await fetch('https://cdn.jsdelivr.net/gh/shiwen1994/poem-kb@main/data/authors.json');
    const ad = await ar.json();
    ad.forEach(a => allAuthors[a.name] = a);

    document.getElementById('statPoems').textContent = allPoems.length.toLocaleString() + ' 首';
    document.getElementById('statAuthors').textContent = Object.keys(allAuthors).length.toLocaleString() + ' 位';

    fuse = new Fuse(allPoems, {
      keys: ['title','author','content','tags','form'],
      threshold: 0.4,
      minMatchCharLength: 1
    });
    renderResults();
  } catch(e) {
    console.error(e);
    document.getElementById('poemList').innerHTML = '<div class="empty">数据加载失败，请检查网络后刷新重试。</div>';
  }
}

function showLoading() {
  document.getElementById('poemList').innerHTML = '<div class="loading" id="loadingMsg">正在加载诗词数据</div>';
}
function updateLoading(msg) {
  const el = document.getElementById('loadingMsg');
  if (el) el.textContent = msg;
  else document.getElementById('poemList').innerHTML = '<div class="loading" id="loadingMsg">' + msg + '</div>';
}

// ═══════════════════════════════════════════════════
// 搜索 & 筛选
// ═══════════════════════════════════════════════════
const searchInput = document.getElementById('searchInput');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentQuery = searchInput.value.trim();
    renderResults();
  }, 200);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderResults();
  });
});

function filterPoems(poems) {
  let result = poems;
  if (currentFilter !== 'all') {
    if (currentFilter === 'Tang') result = result.filter(p => p.dynasty === 'Tang');
    else if (currentFilter === 'Song') result = result.filter(p => p.dynasty === 'Song');
    else result = result.filter(p => p.form === currentFilter || (p.tags && p.tags.includes(currentFilter)));
  }
  return result;
}

function renderResults() {
  let poems;
  if (!fuse) return;
  if (currentQuery) {
    poems = fuse.search(currentQuery).map(r => r.item);
  } else {
    poems = allPoems;
  }
  poems = filterPoems(poems);
  document.getElementById('resultCount').textContent =
    currentQuery ? `找到 ${poems.length.toLocaleString()} 首` : `共 ${poems.length.toLocaleString()} 首`;

  const list = document.getElementById('poemList');
  if (poems.length === 0) {
    list.innerHTML = '<div class="empty">未找到相关诗词</div>';
    return;
  }

  list.innerHTML = poems.slice(0, 100).map(p => {
    const lines = p.content ? p.content.split(/[，。；！？、\n]/).filter(l=>l.trim()).slice(0,2).join('，') : '';
    const tags = (p.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="poem-card" onclick="showPoemModal('${p.id}')">
      <div class="poem-title">${p.title||'无题'}</div>
      <div class="poem-meta">${p.author||''} · ${p.dynasty==='Tang'?'唐':'宋'} · ${p.form||''}</div>
      <div class="poem-snippet">${lines}</div>
      <div class="poem-tags">${tags}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
// 诗词弹窗
// ═══════════════════════════════════════════════════
function showPoemModal(id) {
  const p = allPoems.find(x => x.id === id);
  if (!p) return;
  document.getElementById('mTitle').textContent = p.title || '无题';
  document.getElementById('mAuthor').textContent = `${p.author||''} · ${p.dynasty==='Tang'?'唐':'宋'} · ${p.form||''}`;
  
  const paragraphs = p.content ? p.content.split(/(.{1,20})/g).filter(s=>s.trim()).map((l,i)=>i%2===0?l+'\n':l).join('') : '';
  document.getElementById('mContent').textContent = paragraphs;

  const tagsEl = document.getElementById('mTags');
  if (p.tags && p.tags.length) {
    tagsEl.innerHTML = `<h4>标签</h4>${p.tags.map(t=>`<span class="tag">${t}</span>`).join(' ')}`;
    tagsEl.style.display = 'block';
  } else { tagsEl.style.display = 'none'; }

  document.getElementById('mAllusions').style.display = 'none';
  document.getElementById('poemModal').classList.add('show');
}

function closePoemModal() {
  document.getElementById('poemModal').classList.remove('show');
}
document.getElementById('poemModal').addEventListener('click', e => {
  if (e.target.id === 'poemModal') closePoemModal();
});

// 诗人点击 → 弹窗
function showAuthorModal(name) {
  const a = allAuthors[name];
  if (!a) return;
  document.getElementById('aName').textContent = a.name;
  document.getElementById('aDynasty').textContent = a.dynasty === 'Tang' ? '唐代诗人' : '宋代词人';
  document.getElementById('aDesc').textContent = a.short_desc || a.full_desc || '暂无简介';
  
  const rel = getAuthorRelations(name);
  const relEl = document.getElementById('aRelations');
  if (rel.length) {
    relEl.innerHTML = `<h4>人物关系</h4>${rel.map(r=>`<span class="rel-tag">${r.label}</span>`).join(' ')}`;
    relEl.style.display = 'block';
  } else { relEl.style.display = 'none'; }

  const works = allPoems.filter(p=>p.author===name).slice(0,10);
  const worksEl = document.getElementById('aWorks');
  if (works.length) {
    worksEl.innerHTML = `<h4>代表作</h4>${works.map(w=>w.title||w.form).filter(Boolean).join('、')}`;
    worksEl.style.display = 'block';
  } else { worksEl.style.display = 'none'; }

  document.getElementById('authorModal').classList.add('show');
}

function closeAuthorModal() {
  document.getElementById('authorModal').classList.remove('show');
}
document.getElementById('authorModal').addEventListener('click', e => {
  if (e.target.id === 'authorModal') closeAuthorModal();
});

// ═══════════════════════════════════════════════════
// 诗人关系（硬编码）
// ═══════════════════════════════════════════════════
const RELATIONS = [
  {a:'李白',b:'杜甫',type:'friend',label:'诗友'},
  {a:'李白',b:'孟浩然',type:'friend',label:'诗友'},
  {a:'杜甫',b:'王维',type:'friend',label:'诗友'},
  {a:'王维',b:'孟浩然',type:'friend',label:'诗友'},
  {a:'白居易',b:'元稹',type:'friend',label:'诗友'},
  {a:'韩愈',b:'柳宗元',type:'friend',label:'诗友'},
  {a:'李商隐',b:'杜牧',type:'friend',label:'诗友'},
  {a:'苏轼',b:'王安石',type:'rival',label:'政敌'},
  {a:'苏轼',b:'黄庭坚',type:'friend',label:'诗友'},
  {a:'辛弃疾',b:'陈亮',type:'friend',label:'词友'},
  {a:'李清照',b:'赵明诚',type:'spouse',label:'夫妻'},
  {a:'柳永',b:'范仲淹',type:'contemporary',label:'同时代'},
  {a:'王维',b:'裴迪',type:'friend',label:'诗友'},
  {a:'白居易',b:'刘禹锡',type:'friend',label:'诗友'},
  {a:'陶渊明',b:'谢灵运',type:'influence',label:'影响'},
];

function getAuthorRelations(name) {
  const rel = [];
  RELATIONS.forEach(r => {
    if (r.a === name) rel.push({label: r.label + '：' + r.b, target: r.b});
    if (r.b === name) rel.push({label: r.label + '：' + r.a, target: r.a});
  });
  return rel;
}

// ═══════════════════════════════════════════════════
// Tab2: 诗人关系图谱（D3 Force-Directed Graph）
// ═══════════════════════════════════════════════════
const POETS_FOR_GRAPH = {
  Tang: ['李白','杜甫','王维','孟浩然','白居易','元稹','韩愈','柳宗元','刘禹锡','李商隐','杜牧','王勃','骆宾王','宋之问','贺知章','王昌龄','高适','岑参','王翰','李贺'],
  Song: ['苏轼','王安石','黄庭坚','辛弃疾','李清照','陆游','欧阳修','范仲淹','晏殊','柳永','秦观','周邦彦','岳飞','文天祥','朱熹','杨万里','晏几道','姜夔','吴文英','纳兰性德']
};

function renderGraph() {
  const container = document.getElementById('graphSvg');
  if (container.children.length > 0) return; // 已渲染

  const w = container.clientWidth || 800;
  const h = container.clientHeight || 600;

  const nodes = [...POETS_FOR_GRAPH.Tang.map(n=>({id:n,group:'Tang',name:n})),
                 ...POETS_FOR_GRAPH.Song.map(n=>({id:n,group:'Song',name:n}))];

  const links = [];
  RELATIONS.forEach(r => {
    const src = nodes.find(n=>n.id===r.a);
    const tgt = nodes.find(n=>n.id===r.b);
    if (src && tgt) links.push({source:src.id,target:tgt.id,type:r.type,label:r.label});
  });

  const svg = d3.select('#graphSvg').append('svg')
    .attr('width','100%').attr('height','100%')
    .attr('viewBox',`0 0 ${w} ${h}`);

  const color = d3.scaleOrdinal()
    .domain(['Tang','Song']).range(['#d4a843','#c41e3a']);

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('x', d3.forceX(w/2).strength(0.05))
    .force('y', d3.forceY(h/2).strength(0.05));

  const link = svg.append('g').selectAll('line')
    .data(links).join('line')
    .attr('stroke','rgba(212,168,67,0.2)').attr('stroke-width',1.5);

  const node = svg.append('g').selectAll('circle')
    .data(nodes).join('circle')
    .attr('r',20).attr('fill',d=>color(d.group))
    .attr('stroke','rgba(255,255,255,0.1)').attr('stroke-width',1.5)
    .call(drag(simulation))
    .on('click',(e,d)=>showAuthorModal(d.id));

  const label = svg.append('g').selectAll('text')
    .data(nodes).join('text')
    .text(d=>d.name)
    .attr('text-anchor','middle').attr('dy',35)
    .attr('fill','#888').attr('font-size','12px')
    .style('pointer-events','none');

  simulation.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('cx',d=>d.x).attr('cy',d=>d.y);
    label.attr('x',d=>d.x).attr('y',d=>d.y);
  });

  function drag(simulation) {
    return d3.drag()
      .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;});
  }
}

function renderTimeline() {
  const container = document.getElementById('timelineSvg');
  if (container.children.length > 0) return;
  const w = container.clientWidth || 900;
  const h = 380;
  const margin = {top:60,bottom:40,left:60,right:30};
  const innerW = w - margin.left - margin.right;
  const innerH = h - margin.top - margin.bottom;

  const svg = d3.select('#timelineSvg').append('svg')
    .attr('width',w).attr('height',h)
    .attr('viewBox',`0 0 ${w} ${h}`);

  const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

  const years = TIMELINE_EVENTS.map(e=>e.year);
  const xScale = d3.scaleLinear().domain([d3.min(years),d3.max(years)+30]).range([0,innerW]);

  // 主轴
  g.append('line').attr('x1',0).attr('y1',innerH/2).attr('x2',innerW).attr('y2',innerH/2)
    .attr('stroke','rgba(212,168,67,0.3)').attr('stroke-width',1);

  // 事件
  TIMELINE_EVENTS.forEach(e => {
    const cx = xScale(e.year);
    const isAbove = Math.random() > 0.5;
    const cy = isAbove ? innerH/2 - 50 : innerH/2 + 50;
    const ey = innerH/2;

    g.append('line').attr('x1',cx).attr('y1',cy).attr('x2',cx).attr('y2',ey)
      .attr('stroke','rgba(212,168,67,0.3)').attr('stroke-width',1);

    const color = e.type==='event' ? '#c41e3a' : '#d4a843';
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',4).attr('fill',color);
    g.append('circle').attr('cx',cx).attr('cy',ey).attr('r',3).attr('fill',color);

    g.append('text').attr('x',cx).attr('y',cy-10)
      .attr('text-anchor','middle').attr('fill',color).attr('font-size','11px')
      .text(`${e.year} · ${e.label}`);
  });

  // 标注诗词（随机选取10首有年份的）
  const poetEvents = [
    {year:701,poet:'李白',title:'待考'},
    {year:712,poet:'杜甫',title:'待考'},
    {year:701,poet:'李白',title:'静夜思'},

    {year:757,poet:'李白',title:'早发白帝城'},
    {year:1046,poet:'范仲淹',title:'岳阳楼记'},
    {year:1082,poet:'苏轼',title:'念奴娇·赤壁怀古'},
    {year:1135,poet:'李清照',title:'声声慢'},
    {year:1178,poet:'辛弃疾',title:'青玉案·元夕'},
    {year:1205,poet:'文天祥',title:'过零丁洋'},
  ];

  poetEvents.forEach((pe, i) => {
    const cx = xScale(pe.year) + (i%3-1)*6;
    const cy = innerH/2 - 20;
    g.append('text').attr('x',cx).attr('y',cy)
      .attr('text-anchor','middle').attr('fill','#666').attr('font-size','10px')
      .text(pe.poet);

function renderAllusions() {
  const list = document.getElementById('allusionList');
  if (list.children.length > 0) return;
  renderAllusionList(ALLUSIONS);

  document.getElementById('allusionSearch').addEventListener('input', e => {
    const q = e.target.value.trim();
    const filtered = q ? ALLUSIONS.filter(a =>
      a.name.includes(q) || a.meaning.includes(q) || a.origin.includes(q)) : ALLUSIONS;
    renderAllusionList(filtered);
  });
}

function renderAllusionList(allusions) {
  const list = document.getElementById('allusionList');
  list.innerHTML = allusions.map(a => `
    <div class="allusion-card">
      <h4>${a.name}</h4>
      <p>${a.meaning}</p>
      <p class="source">出处：${a.origin}</p>
      ${a.poems.map(p=>`<div class="tag" style="margin-top:6px">${p}</div>`).join('')}
    </div>`).join('');
}
