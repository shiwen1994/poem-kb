{"id": "song_ci_ci.song.1000.json_449", "title": "水龙吟", "author": "苏轼", "dynasty": "Song", "form": "水龙吟", "content": "楚山修竹如云，异材秀出千林表。龙须半翦，凤膺微涨，玉肌匀绕。木落淮南，雨晴云梦，月明风袅。自中郎不见，桓伊去后，知孤负、秋多少。闻道岭南太守，后堂深、绿珠娇小。绮窗学弄，梁州初遍，霓裳未了。嚼徵含宫，泛商流羽，一声云杪。为使君洗尽，蛮风瘴雨，作霜天晓。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_450", "title": "水龙吟", "author": "苏轼", "dynasty": "Song", "form": "水龙吟", "content": "似花还似非花，也无人惜从教坠。抛家傍路，思量却是，无情有思。萦损柔肠，困酣娇眼，欲开还闭。梦随风万里，寻郎去处，又还被、莺呼起。不恨此花飞尽，恨西园、落红难缀。晓来雨过，遗踪何在，一池萍碎。春色三分，二分尘土，一分流水。细看来，不是杨花点点，是离人泪。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_451", "title": "水龙吟", "author": "苏轼", "dynasty": "Song", "form": "水龙吟", "content": "小舟横截春江，卧看翠壁红楼起。云间笑语，使君高会，佳人半醉。危柱哀弦，艳歌馀响，绕云萦水。念故人老大，风流未减，独回首、烟波里。推枕惘然不见，但空江、月明千里。五湖闻道，扁舟归去，仍携西子。云梦南州，武昌南岸，昔游应记。料多情梦里，端来见我，也参差是。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_452", "title": "满庭芳", "author": "苏轼", "dynasty": "Song", "form": "满庭芳", "content": "归去来兮，吾归何处，万里家在岷峨。百年强半，来日苦无多。坐见黄州再闰，儿童尽、楚语吴歌。山中友，鸡豚社酒，相劝老东坡。云何。当此去，人生底事，来往如梭。待闲看，秋风洛水清波。好在堂前细柳，应念我、莫翦柔柯。仍传语，江南父老，时与晒渔蓑。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_453", "title": "满庭芳", "author": "苏轼", "dynasty": "Song", "form": "满庭芳", "content": "香叆雕盘，寒生冰箸，画堂别是风光。主人情重，开宴出红妆。腻玉圆搓素颈，藕丝嫩、新织仙裳。双歌罢，虚檐转月，馀韵尚悠扬。人间，何处有，司空见惯，应谓寻常。坐中有狂客，恼乱愁肠。报道金钗坠也，十指露、春笋纤长。亲曾见，全胜宋玉，想像赋高唐。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "月", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_454", "title": "满庭芳", "author": "苏轼", "dynasty": "Song", "form": "满庭芳", "content": "蜗角虚名，蝇头微利，算来著甚乾忙。事皆前定，谁弱又谁强。且趁闲身未老，尽放我、些子疏狂。百年里，浑教是醉，三万六千场。思量。能几许，忧愁风雨，一半相妨。又何须，抵死说短论长。幸对清风皓月，苔茵展、云幕高张。江南好，千锺美酒，一曲《满庭芳》。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_455", "title": "满庭芳", "author": "苏轼", "dynasty": "Song", "form": "满庭芳", "content": "三十三年，今谁存者，算只君与长江。凛然苍桧，霜干苦难双。闻道司州古县，云溪上、竹坞松窗。江南岸，不因送子，宁肯过吾邦。摐摐。疏雨过，风林舞破，烟盖云幢。愿持此邀君，一饮空缸。居士先生老矣，真梦里、相对残釭。歌舞断，行人未起，船鼓已逄逄。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_456", "title": "满庭芳", "author": "苏轼", "dynasty": "Song", "form": "满庭芳", "content": "三十三年，飘流江海，万里烟浪云帆。故人惊怪，憔悴老青衫。我自疏狂异趣，君何事、奔走尘凡。流年尽，穷途坐守，船尾冻相衔。巉巉。淮浦外，层楼翠壁，古寺空岩。步携手林间，笑挽ホホ。莫上孤峰尽处，萦望眼、云海相搀。家何在，因君问我，归梦绕松杉。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_457", "title": "水调歌头", "author": "苏轼", "dynasty": "Song", "form": "水调歌头", "content": "落日绣帘卷，亭下水连空。知君为我，新作窗户湿青红。长记平山堂上，敧枕江南烟雨，渺渺没孤鸿。认得醉翁语，山色有无中。一千顷，都镜净，倒碧峰。忽然浪起，掀舞一叶白头翁。堪笑兰台公子，未解庄生天籁，刚道有雌雄。一点浩然气，千里快哉风。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_458", "title": "水调歌头", "author": "苏轼", "dynasty": "Song", "form": "水调歌头", "content": "安石在东海，从事鬓惊秋。中年亲友难别，丝竹缓离愁。一旦功成名遂，准拟东还海道，扶病入西州。雅志困轩冕，遗恨寄沧洲。岁云暮，须早计，要褐裘。故乡归去千里，佳处辄迟留。我醉歌时君和，醉倒须君扶我，惟酒可忘忧。一任刘玄德，相对卧高楼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_459", "title": "水调歌头", "author": "苏轼", "dynasty": "Song", "form": "水调歌头", "content": "明月几时有，把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆。人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "月", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_460", "title": "水调歌头", "author": "苏轼", "dynasty": "Song", "form": "水调歌头", "content": "昵昵儿女语，灯火夜微明。恩冤尔汝来去，弹指泪和声。忽变轩昂勇士，一鼓填然作气，千里不留行。回首暮云远，飞絮搅青冥。众禽里，真彩凤，独不鸣。跻攀寸步千险，一落百寻轻。烦子指间风雨，置我肠中冰炭，起坐不能平。推手从归去，无泪与君倾。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_461", "title": "满江红", "author": "苏轼", "dynasty": "Song", "form": "满江红", "content": "忧喜相寻，风雨过、一江春绿。巫峡梦、至今空有，乱山屏簇。何似伯鸾携德耀，箪瓢未足清欢足。渐粲然、光彩照阶庭，生兰玉。幽梦里，传心曲。肠断处，凭他续。文君婿知否，笑君卑辱。君不见周南歌汉广，天教夫子休乔木。便相将、左手抱琴书，云间宿。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_462", "title": "满江红", "author": "苏轼", "dynasty": "Song", "form": "满江红", "content": "江汉西来，高楼下、蒲萄深碧。犹自带、岷峨云浪，锦江春色。君是南山遗爱守，我为剑外思归客。对此间、风物岂无情，殷勤说。江表传，君休读。狂处士，真堪惜。空洲对鹦鹉，苇花萧瑟。不独笑书生争底事，曹公黄祖俱飘忽。愿使君、还赋谪仙诗，追黄鹤。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_463", "title": "满江红", "author": "苏轼", "dynasty": "Song", "form": "满江红", "content": "东武南城，新堤固、涟漪初溢。隐隐遍、长林高阜，卧红堆碧。枝上残花吹尽也，与君更向江头觅。问向前、犹有几多春，三之一。官里事，何时毕。风雨外，无多日。相将泛曲水，满城争出。君不见兰亭修禊事，当时坐上皆豪逸。到如今、修竹满山阴，空陈迹。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_464", "title": "满江红", "author": "苏轼", "dynasty": "Song", "form": "满江红", "content": "清颖东流，愁目断、孤帆明灭。宦游处、青山白浪，万重千叠。孤负当年林下意，对床夜雨听萧瑟。恨此生、长向别离中，添华发。一尊酒，黄河侧。无限事，从头说。相看恍如昨，许多年月。衣上旧痕馀苦泪，眉间喜气添黄色。便与君、池上觅残春，花如雪。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_465", "title": "满江红", "author": "苏轼", "dynasty": "Song", "form": "满江红", "content": "天岂无情，天也解、多情留客。春向暖、朝来底事，尚飘轻雪。君过春来纡组绶，我应归去耽泉石。恐异时、杯酒忽相思，云山隔。浮世事，俱难必。人纵健，头应白。何辞更一醉，此欢难觅。欲向佳人诉离恨，泪珠先已凝双睫。但莫遣、新燕却来时，音书绝。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_466", "title": "归朝欢", "author": "苏轼", "dynasty": "Song", "form": "归朝欢", "content": "我梦扁舟浮震泽。雪浪摇空千顷白。觉来满眼是庐山，倚天无数开青壁。此生长接淅。与君同是江南客。梦中游，觉来清赏，同作飞梭掷。明日西风还挂席。唱我新词泪沾臆。灵均去后楚山空，澧阳兰芷无颜色。君才如梦得。武陵更在西南极。竹枝词，莫摇新唱，谁谓古今隔。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_467", "title": "念奴娇", "author": "苏轼", "dynasty": "Song", "form": "念奴娇", "content": "大江东去，浪淘尽、千古风流人物。故垒西边人道是，三国周郎赤壁。乱石穿空，惊涛拍岸，卷起千堆雪。江山如画，一时多少豪杰。遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾谈笑间，强虏灰飞烟灭。故国神游，多情应笑，我早生华发。人间如梦，一尊还酹江月。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "战争", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_468", "title": "雨中花・夜行船", "author": "苏轼", "dynasty": "Song", "form": "雨中花・夜行船", "content": "今岁花时深院，尽日东风，荡扬茶烟。但有绿苔芳草，柳絮榆钱。闻道城西，长廊古寺，甲第名园。有国艳带酒，天香染袂，为我留连。清明过了，残红无处，对此泪洒尊前。秋向晚，一枝何事，向我依然。高会聊追短景，清商不暇馀妍。不如留取，十分春态，付与明年。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_469", "title": "沁园春", "author": "苏轼", "dynasty": "Song", "form": "沁园春", "content": "孤馆灯青，野店鸡号，旅枕梦残。渐月华收练，晨霜耿耿，云山摛锦，朝露清清。世路无穷，劳生有限，似此区区长鲜欢。微吟罢，凭征鞍无语，往事千端。当时共客长安。似二陆初来俱少年。有笔头千字，胸中万卷，致君尧舜，此事何难。用舍由时，行藏在我，袖手何妨闲处看。身长健，但优游卒岁，且斗尊前。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_470", "title": "劝金船", "author": "苏轼", "dynasty": "Song", "form": "劝金船", "content": "无情流水多情客。劝我如曾识。杯行到手休辞却。这公道难得。曲水池上，小字更书年月。还对茂林修竹，似永和节。纤纤素手如霜雪。笑把秋花插。尊前莫怪歌声咽。又还是轻别。此去翱翔，遍赏玉堂金阙。欲问再来何岁，应有华发。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_471", "title": "一丛花", "author": "苏轼", "dynasty": "Song", "form": "一丛花", "content": "今年春浅腊侵年。冰雪破春妍。东风有信无人见，露微意、柳际花边。寒夜纵长，孤衾易暖，钟鼓渐清圆。朝来初日半含山。楼阁淡疏烟。游人便作寻芳计，小桃杏、应已争先。衰病少情，疏慵自放，惟爱日高眠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_472", "title": "木兰花令", "author": "苏轼", "dynasty": "Song", "form": "木兰花令", "content": "霜馀已失长淮阔。空听潺潺清颍咽。佳人犹唱醉翁词，四十三年如电抹。草头秋露流珠滑。三五盈盈还二八。与余同是识翁人，惟有西湖波底月。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_473", "title": "木兰花令", "author": "苏轼", "dynasty": "Song", "form": "木兰花令", "content": "知君仙骨无寒暑。千载相逢犹旦暮。故将别语恼佳人，要看梨花枝上雨。落花已逐回风去。花本无心莺自诉。明朝归路下塘西，不见莺啼花落处。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_474", "title": "木兰花令", "author": "苏轼", "dynasty": "Song", "form": "木兰花令", "content": "梧桐叶上三更雨。惊破梦魂无觅处。夜凉枕簟已知秋，更听寒蛩促机杼。梦中历历来时路。犹在江亭醉歌舞。尊前必有问君人，为道别来心与绪。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_475", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "公子眼花乱发，老夫鼻观先通。领巾飘下瑞香风。惊起谪仙春梦。后土祠中玉蕊，蓬莱殿后鞓红。此花清绝更纤秾。把酒何人心动。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_476", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "小院朱阑几曲，重城画鼓三通。更看微月转光风。归去香云入梦。翠袖争浮大白，皂罗半插斜红。灯花零落酒花秾。妙语一时飞动。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_477", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "怪此花枝怨泣，托君诗句名通。凭将草木记吴风。继取相如云梦。点笔袖沾醉墨，谤花面有惭红。知君却是为情秾。怕见此花撩动。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_478", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "闻道双衔凤带，不妨单著鲛绡。夜香知与阿谁烧。怅望水沈烟袅。云鬓风前绿卷，玉颜醉里红潮。莫教空度可怜宵。月与佳人共僚。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_479", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "点点楼头细雨。重重江外平湖。当年戏马会东徐。今日凄凉南浦。莫恨黄花未吐。且教红粉相扶。酒阑不必看茱萸。俯仰人间今古。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "战争", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_480", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "龙焙今年绝品，谷帘自古珍泉。雪芽双井散神仙。苗裔来从北苑。汤发云腴酽白，盏浮花乳轻圆。人间谁敢更争妍。斗取红窗粉面。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_481", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "别梦已随流水，泪巾犹裛香泉。相如依旧是臞仙。人在瑶台阆苑。花雾萦风缥缈，歌珠滴水清圆。蛾眉新作十分妍。走马归来便面。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "战争", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_482", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "世事一场大梦，人生几度秋凉。夜来风叶已鸣廊。看取眉头鬓上。酒贱常愁客少，月明多被云妨。中秋谁与共孤光。把盏凄然北望。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_483", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "莫叹平原落落，且应去鲁迟迟。与君各记少年时。须信人生如寄。白发千茎相送，深杯百罚休辞。拍浮何用酒为池。我已为君德醉。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_484", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "玉骨那愁瘴雾，冰姿自有仙风。海仙时遣探芳丛。倒挂绿毛么凤。素面翻嫌粉涴，洗妆不褪唇红。高情已逐晓云空。不与梨花同梦。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_485", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "照野弥弥浅浪，横空暧暧微霄。障泥未解玉骢骄。我欲醉眠芳草。可惜一溪明月，莫教踏破琼瑶。解鞍敧枕绿杨桥。杜宇一声春晓。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_486", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "三过平山堂下，半生弹指声中。十年不见老仙翁。壁上龙蛇飞动。欲吊文章太守，仍歌杨柳春风。休言万事转头空。未转头时皆梦。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_487", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "昨夜扁舟京口，今朝马首长安。旧官何物与新官。只有湖山公案。此景百年几变，个中下语千难。使君才气卷波澜。与把新诗判断。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "战争", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_488", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "细马远驮双侍女，青巾玉带红靴。溪山好处便为家。谁知巴峡路，却见洛城花。面旋落英飞玉蕊，人间春日初斜。十年不见紫云车。龙丘新洞府，铅鼎养丹砂。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_489", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "诗句端来磨我钝，钝锥不解生鋩。欢颜为我解冰霜。酒阑清梦觉，春草满池塘。应念雪堂坡下老，昔年共采芸香。功成名遂早还乡。回车来过我，乔木拥千章。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_490", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "我劝髯张归去好，从来自己忘情。尘心消尽道心平。江南与塞北，何处不堪行。俎豆庚桑真过矣，凭君说与南荣。愿闻吴越报丰登。君王如有问，结袜赖王生。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "战争", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_491", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "自古相从休务日，何妨低唱微吟。天垂云重作春阴。坐中人半醉，帘外雪将深。闻道分司狂御史，紫云无路追寻。凄风寒雨是骎骎。问囚长损气，见鹤忽惊心。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_492", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "忘却成都来十载，因君未免思量。凭将清泪洒江阳。故山知好在，孤客自悲凉。坐上别愁君未见，归来欲断无肠。殷勤且更尽离觞。此身如传舍，何处是吾乡。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_493", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "尊酒何人怀李白，草堂遥指江东。珠帘十里卷香风。花开又花谢，离恨几千重。轻舸渡江连夜到，一时惊笑衰容。语音犹自带吴侬。夜阑对酒处，依旧梦魂中。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_494", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "九十日春都过了，贪忙何处追游。三分春色一分愁。雨翻榆荚阵，风转柳花球。阆苑先生须自责，蟠桃动是千秋。不知人世苦厌求。东皇不拘束，肯为使君留。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_495", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "四大从来都遍满，此间风水何疑。故应为我发新诗。幽花香涧谷，寒藻舞沦漪。借与玉川生两腋，天仙未必相思。还凭流水送人归。层巅馀落日，草露已沾衣。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_496", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "一别都门三改火，天涯踏尽红尘。依然一笑作春温。无波真古井，有节是秋筠。惆怅孤帆连夜发，送行淡月微云。尊前不用翠眉颦。人生如逆旅，我亦是行人。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_497", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "多病休文都瘦损，不堪金带垂腰。望湖楼上暗香飘。和风春弄袖，明月夜闻箫。酒醒梦回清漏永，隐床无限更潮。佳人不见董娇饶。徘徊花上月，空度可怜宵。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_498", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "夜饮东坡醒复醉，归来仿佛三更。家童鼻息已雷鸣。敲门都不应，倚杖听江声。长恨此身非我有，何时忘却营营。夜阑风静縠纹平。小舟从此逝，江海寄馀生。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_499", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "冬夜夜寒冰合井，画堂明月侵帏。青缸明灭照悲啼。青缸挑欲尽，粉泪裛还垂。未尽一尊先掩泪，歌声半带清悲。情声两尽莫相违。欲知肠断处，梁上暗尘飞。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_500", "title": "渔家傲", "author": "苏轼", "dynasty": "Song", "form": "渔家傲", "content": "千古龙蟠并虎踞。从公一吊兴亡处。渺渺斜风吹细雨。芳草渡。江南父老留公住。公驾飞车凌彩雾。红鸾骖乘青鸾驭。却讶此洲名白鹭。非吾侣。翩然欲下还飞去。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_501", "title": "渔家傲", "author": "苏轼", "dynasty": "Song", "form": "渔家傲", "content": "送客归来灯火尽。西楼淡月凉生晕。明日潮来无定准。潮来稳。舟横渡口重城近。江水似知孤客恨。南风为解佳人愠。莫学时流轻久困。频寄问。钱塘江上须忠信。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_502", "title": "渔家傲", "author": "苏轼", "dynasty": "Song", "form": "渔家傲", "content": "皎皎牵牛河汉女。盈盈临水无由语。望断碧云空日暮。无寻处。梦回芳草生春浦。鸟散馀花纷似雨。汀洲苹老香风度。明月多情来照户。但揽取。清光长送人归去。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_503", "title": "渔家傲", "author": "苏轼", "dynasty": "Song", "form": "渔家傲", "content": "一曲《阳关》情几许。知君欲向秦川去。白马皂貂留不住。回首处。孤城不见天霖雾。到日长安花似雨。故关杨柳初飞絮。渐见靴刀迎夹路。谁得似。风流膝上王文度。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["战争", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_504", "title": "鹧鸪天", "author": "苏轼", "dynasty": "Song", "form": "鹧鸪天", "content": "林断山明竹隐墙。乱蝉衰草小池塘。翻空白鸟时时见，照水红蕖细细香。村舍外，古城旁。杖藜徐步转斜阳。殷勤昨夜三更雨，又得浮生一日凉。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_505", "title": "鹧鸪天", "author": "苏轼", "dynasty": "Song", "form": "鹧鸪天", "content": "笑拈红梅亸翠翘。扬州十里最妖饶。夜来绮席亲曾见，撮得精神滴滴娇。娇后眼，舞时腰。刘郎几度欲魂消。明朝酒醒知何处，肠断云间《紫玉箫》。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_506", "title": "少年游", "author": "苏轼", "dynasty": "Song", "form": "少年游", "content": "银塘朱槛曲尘波。圆绿卷新荷。兰条荐浴，菖花酿酒，天气尚清和。好将沈醉酬佳节，十分酒、一分歌。狱草烟深，讼庭人悄，无吝宴游过。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_507", "title": "少年游", "author": "苏轼", "dynasty": "Song", "form": "少年游", "content": "去年相送，馀杭门外，飞雪似杨花。今年春尽，杨花似雪，犹不见还家。对酒卷帘邀明月，风露透窗纱。恰似姮娥怜双燕，分明照、画梁斜。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_508", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "两两轻红半晕腮。依依独为使君回。若道使君无此意。何为。双花不向别人开。但看低昂烟雨里。不已。劝君休诉十分杯。更问尊前狂副使。来岁。花开时节与谁来。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_509", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "莫听穿林打叶声。何妨吟啸且徐行。竹杖芒鞋轻胜马。谁怕。一蓑烟雨任平生。料峭春风吹酒醒。微冷。山头斜照却相迎。回首向来潇洒处。归去。也无风雨也无晴。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_510", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "与客携壶上翠微。江涵秋影雁初飞。尘世难逢开口笑。年少。菊花须插满头归。酩酊但酬佳节了。云峤。登临不用怨斜晖。古往今来谁不老。多少。牛山何必更沾衣。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_511", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "莫怪鸳鸯绣带长。腰轻不胜舞衣裳。薄幸只贪游冶去。何处。垂杨系马恣轻狂。花谢絮飞春又尽。堪恨。断弦尘管伴啼妆。不信归来但自看。怕见。为郎憔悴却羞郎。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_512", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "千古风流阮步兵。平生游宦爱东平。千里远来还不住。归去。空留风韵照人清。红粉尊前深懊恼。休道。怎生留得许多情。记得明年花絮乱。须看。泛西湖是断肠声。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "战争", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_513", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "雨洗娟娟嫩叶光。风吹细细绿筠香。秀色乱侵书帙晚。帘卷。清阴微过酒尊凉。人画竹身肥拥肿。何用。先生落笔胜萧郎。记得小轩岑寂夜。廊下。月和疏影上东墙。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_514", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "好睡慵开莫厌迟。自怜冰脸不时宜。偶作小红桃杏色，闲雅，尚馀孤瘦雪霜姿。休把闲心随物态，何事，酒生微晕沁瑶肌。诗老不知梅格在，吟咏，更看绿叶与青枝。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_515", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "月满苕溪照夜堂。五星一老斗光芒。十五年间真梦里。何事。长庚对月独凄凉。绿鬓苍颜同一醉。还是。六人吟笑水云乡。宾主谈锋谁得似。看取。曹刘今对两苏张。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_516", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "常羡人间琢玉郎。天应乞与点酥娘。尽道清歌传皓齿。风起。雪飞炎海变清凉。万里归来颜愈少。微笑。笑时犹带岭梅香。试问岭南应不好。却道。此心安处是吾乡。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_517", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "晚景落琼杯。照眼云山翠作堆。认得岷峨春雪浪，初来。万顷蒲萄涨渌醅。暮雨暗阳台。乱洒高楼湿粉腮。一阵东风来卷地，吹回。落照江天一半开。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_518", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "寒雀满疏篱。争抱寒柯看玉蕤。忽见客来花下坐，惊飞。蹋散芳英落酒卮。痛饮又能诗。坐客无毡醉不知。花尽酒阑春到也，离离。一点微酸已著枝。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_519", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "不到谢公台。明月清风好在哉。旧日髯孙何处去，重来。短李风流更上才。秋色渐摧颓。满院黄英映酒杯。看取桃花春二月，争开。尽是刘郎去后栽。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_520", "title": "少年游", "author": "苏轼", "dynasty": "Song", "form": "少年游", "content": "霜降水痕收。浅碧鳞鳞露远洲。酒力渐消风力软，飕飕。破帽多情却恋头。佳节若为酬。但把清尊断送秋。万事到头都是梦，休休。明日黄花蝶也愁。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_521", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "回首乱山横。不见居人只见城。谁似临平山上塔，亭亭。迎客西来送客行。归路晚风清。一枕初寒梦不成。今夜残灯斜照处，荧荧。秋雨晴时泪不晴。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_522", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "冰雪透香肌。姑射仙人不似伊。濯锦江头新样锦，非宜。故著寻常淡薄衣。暖日下重帏。春睡香凝索起迟。曼倩风流缘底事，当时。爱被西真唤作儿。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_523", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "东武望馀杭。云海天涯两杳茫。何日功成名遂了，还乡。醉笑陪公三万场。不用诉离觞。痛饮从来别有肠。今夜送归灯火冷，河塘。堕泪羊公却姓杨。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_524", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "凉簟碧纱厨。一枕清风昼睡馀。睡听晚衙无一事，徐徐。读尽床头几卷书。搔首赋归欤。自觉功名懒更疏。若问使君才与术，何如。占得人间一味愚。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_525", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "裙带石榴红。却水殷勤解赠侬。应许逐鸡鸡莫怕，相逢。一点灵犀必暗通。何处遇良工。琢刻天真半欲空。愿作龙香双凤拨，轻拢。长在环儿白雪胸。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_526", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "旌旆满江湖。诏发楼船万舳舻。投笔将军因笑我，迂儒。帕首腰刀是丈夫。粉泪怨离居。喜子垂窗报捷书。试问伏波三万语，何如。一斛明珠换绿珠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_527", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "天与化工知。赐得衣裳总是绯。每向华堂深处见，怜伊。两个心肠一片儿。自小便相随。绮席歌筵不暂离。苦恨人人分拆破，东西。怎得成双似旧时。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_528", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "寒玉细凝肤。清歌一曲《倒金壶》。冶叶倡条遍相识，争如。豆蔻花梢二月初。年少即须臾。芳时偷得醉工夫。罗帐细垂银烛背，欢娱。豁得平生俊气无。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_529", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "怅望送春杯。渐老逢春能几回。花满楚城愁远别，伤怀。何况清丝急管催。吟断望乡台。万里归心独上来。景物登临闲始见，徘徊。一寸相思一寸灰。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "酒", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_530", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "何处倚阑干。弦管高楼月正圆。胡蝶梦中家万里，依然。老去愁来强自宽。明镜借红颜。须著人间比梦间。蜡烛半笼金翡翠，更阑。绣被焚香独自眠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "月", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_531", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "山与歌眉敛，波同醉眼流。游人都上十三楼。不羡竹西歌吹、古扬州。菰黍连昌歜，琼彝倒玉舟。谁家《水调》唱歌头。声绕碧山飞去、晚云留。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_532", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "古岸开青葑，新渠走碧流。会看光满万家楼。记取他年扶路、入西州。佳节连梅雨，馀生寄叶舟。只将菱角与鸡头。更有月明千顷、一时留。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "月", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_533", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "雨暗初疑夜，风回忽报晴。淡云斜照著山明。细草软沙溪路、马蹄轻。卯酒醒还困，仙材梦不成。蓝桥何处觅云英。只有多情流水、伴人行。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "战争", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_534", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "日出西山雨，无晴又有晴。乱山深处过清明。不见彩绳花板、细腰轻。尽日行桑野，无人与目成。且将新句琢琼英。我是世间闲客、此闲行。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_535", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "带酒冲山雨，和衣睡晚晴。不知钟鼓报天明。梦里栩然蝴蝶、一身轻。老去才都尽，归来计未成。求田问舍笑豪英。自爱湖边沙路、免泥行。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_536", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "日薄花房绽，风和麦浪轻。夜来微雨洗郊坰。正是一年春好、近清明。已改煎茶火，犹调入粥饧。使君高会有馀清。此乐无声无味、最难名。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_537", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "海上乘槎侣，仙人萼绿华。飞升元不用丹砂。住在潮头来处、渺天涯。雷辊夫差国，云翻海若家。坐中安得弄琴牙。写取馀声归向、水仙夸。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_538", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "苒苒中秋过，萧萧两鬓华。寓身化世一尘沙。笑看潮来潮去、了生涯。方士三山路，渔人一叶家。早知身世两聱牙。好伴骑鲸公子、赋雄夸。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_539", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "师唱谁家曲，宗风嗣阿谁。借君拍板与门槌。我也逢场作戏、莫相疑。溪女方偷眼，山僧莫眨眉。却愁弥勒下生迟。不见老婆三五、少年时。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_540", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "欲执河梁手，还升月旦堂。酒阑人散月侵廊。北客明朝归去、雁南翔。窈窕高明玉，风流郑季庄。一时分散水云乡。惟有落花芳草、断人肠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_541", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "山雨潇潇过，溪桥浏浏清。小园幽榭枕苹汀。门外月华如水、彩舟横。苕岸霜花尽，江湖雪阵平。两山遥指海门青。回首水云何处、觅孤城。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_542", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "紫陌寻春去，红尘拂面来。无人不道看花回。惟见石榴新蕊、一枝开。冰簟堆云髻，金尊滟玉醅。绿阴青子莫相催。留取红巾千点、照池台。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_543", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "卫霍元勋后，韦平外族贤。吹笙只合在缑山。闲驾彩峦归去、趁新年。烘暖烧香阁，轻寒浴佛天。他时一醉画堂前。莫忘故人憔悴、老江边。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_544", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "笑怕蔷薇罥，行忧宝瑟僵。美人依约在西厢。祗恐暗中迷路、认馀香。午夜风翻幔，三更月到床。簟纹如水玉肌凉。何物与侬归去、有残妆。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_545", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "寸恨谁云短，绵绵岂易裁。半年眉绿未曾开。明月好风闲处、是人猜。春雨消残冻，温风到冷灰。尊前一曲为谁哉。留取曲终一拍、待君来。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_546", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "绀绾双蟠髻，云敧小偃巾。轻盈红脸小腰身。叠鼓忽催花拍、斗精神。空阔轻红歇，风和约柳春。蓬山才调最清新。胜似缠头千锦、共藏珍。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_547", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "琥珀装腰佩，龙香入领巾。只应飞燕是前身。共看剥葱纤手、舞凝神。柳絮风前转，梅花雪里春。鸳鸯翡翠两争新。但得周郎一顾、胜珠珍。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_548", "title": "好事近", "author": "苏轼", "dynasty": "Song", "form": "好事近", "content": "红粉莫悲啼，俯仰半年离别。看取雪堂坡下，老农夫凄切。明年春水漾桃花，柳岸隘舟楫。从此满城歌吹，看黄州阗咽。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_549", "title": "好事近", "author": "苏轼", "dynasty": "Song", "form": "好事近", "content": "湖上雨晴时，秋水半篙初没。朱槛俯窥寒鉴，照衰颜华发。醉中吹堕白纶巾，溪风漾流月。独棹小舟归去，任烟波飘兀。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_550", "title": "鹊桥仙", "author": "苏轼", "dynasty": "Song", "form": "鹊桥仙", "content": "缑山仙子，高情云渺，不学痴牛呆女。凤箫声断月明中，举手谢、时人欲去。客槎曾犯，银河微浪，尚带天风海雨。相逢一醉是前缘，风雨散、飘然何处。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_551", "title": "鹊桥仙", "author": "苏轼", "dynasty": "Song", "form": "鹊桥仙", "content": "乘槎归去，成都何在，万里江沱汉漾。与君各赋一篇诗，留织女、鸳鸯机上。还将旧曲，重赓新韵，须信吾侪天放。人生何处不儿嬉，看乞巧、朱楼彩舫。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_552", "title": "望江南・忆江南", "author": "苏轼", "dynasty": "Song", "form": "望江南・忆江南", "content": "春已老，春服几时成。曲水浪低蕉叶稳，舞雩风软纻罗轻。酣咏乐升平。微雨过，何处不催耕。百舌无言桃李尽，柘林深处鹁鸪鸣。春色属芜菁。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_553", "title": "望江南・忆江南", "author": "苏轼", "dynasty": "Song", "form": "望江南・忆江南", "content": "春未老，风细柳斜斜。试上超然台上看，半壕春水一城花。烟雨暗千家。寒食后，酒醒却咨嗟。休对故人思故国，且将新火试新茶。诗酒趁年华。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_554", "title": "卜算子", "author": "苏轼", "dynasty": "Song", "form": "卜算子", "content": "蜀客到江南，长忆吴山好。吴蜀风流自古同，归去应须早。还与去年人，共藉西湖草。莫惜尊前仔细看，应是容颜老。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_555", "title": "卜算子", "author": "苏轼", "dynasty": "Song", "form": "卜算子", "content": "缺月挂疏桐，漏断人初静。时见幽人独往来，缥缈孤鸿影。惊起却回头，有恨无人省。拣尽寒枝不肯栖，枫落吴江冷。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_556", "title": "瑞鹧鸪", "author": "苏轼", "dynasty": "Song", "form": "瑞鹧鸪", "content": "碧山影里小红旗。侬是江南踏浪儿。拍手欲嘲山简醉，齐声争唱《浪婆词》。西兴渡口帆初落，渔浦山头日未敧。侬欲送潮歌底曲，尊前还唱使君诗。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_557", "title": "十拍子・破阵子", "author": "苏轼", "dynasty": "Song", "form": "十拍子・破阵子", "content": "白酒新开九酝，黄花已过重阳。身外傥来都似梦，醉里无何即是乡。东坡日月长。玉粉旋烹茶乳，金齑新捣橙香。强染霜髭扶翠袖，莫道狂夫不解狂。狂夫老更狂。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_558", "title": "清平乐", "author": "苏轼", "dynasty": "Song", "form": "清平乐", "content": "清淮蜀汴。更在江西岸。红旆到时黄叶乱。霜入梁王故苑。秋原何处携壶。停骖访古踟蹰。双庙遗风尚在，漆园傲吏应无。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_559", "title": "昭君怨", "author": "苏轼", "dynasty": "Song", "form": "昭君怨", "content": "谁作桓伊《三弄》。惊破绿窗幽梦。新月与愁烟。满江天。欲去又还不去。明日落花飞絮。飞絮送行舟。水东流。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_560", "title": "戚氏", "author": "苏轼", "dynasty": "Song", "form": "戚氏", "content": "玉龟山。东皇灵媲统群仙。绛阙岧嶢，翠房深迥，倚霏烟。幽闲。志萧然。金城千里锁婵娟。当时穆满巡狩。翠华曾到海西边。风露明霁，鲸波极目，势浮舆盖方圆。正迢迢丽日。玄圃清寂，琼草芊绵。争解绣勒香鞯。鸾辂驻跸，八马戏芝田。瑶池近、画楼隐隐，翠鸟翩翩。肆华筵。间作脆管鸣弦。宛若帝所钧天。稚颜皓齿，绿发方瞳，圆极恬淡高妍。尽倒琼壶酒，献金鼎药，固大椿年。缥缈飞琼妙舞，命双成、奏曲醉留连。云璈韵响泻寒泉。浩歌畅饮，斜月低河汉。渐渐绮霞、天际红深浅。动归思、回首尘寰。烂漫游、玉辇东还。杏花风、数里响鸣鞭。望长安路，依稀柳色，翠点春妍。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_561", "title": "醉蓬莱", "author": "苏轼", "dynasty": "Song", "form": "醉蓬莱", "content": "笑劳生一梦，羁旅三年，又还重九。华发萧萧，对荒园搔首。赖有多情，好饮无事，似古人贤守。岁岁登高，年年落帽，物华依旧。此会应须烂醉，仍把紫菊茱萸，细看重嗅。摇落霜风，有手栽双柳。来岁今朝，为我西顾，酹羽觞江口。会与州人，饮公遗爱，一江醇酎。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_562", "title": "贺新郎", "author": "苏轼", "dynasty": "Song", "form": "贺新郎", "content": "乳燕飞华屋。悄无人、桐阴转午，晚凉新浴。手弄生绡白团扇，扇手一时似玉。渐困倚、孤眠清熟。帘外谁来推绣户，枉教人、梦断瑶台曲。又却是，风敲竹。石榴半吐红巾蹙。待浮花、浪蕊都尽，伴君幽独。秾艳一枝细看取，芳心千重似束。又恐被、秋风惊绿。若待得君来向此，花前对酒不忍触。共粉泪，两蔌蔌。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_563", "title": "洞仙歌", "author": "苏轼", "dynasty": "Song", "form": "洞仙歌", "content": "江南腊尽，早梅花开后。分付新春与垂柳。细腰肢、自有入格风流，仍更是、骨体清英雅秀。永丰坊那畔，尽日无人，惟见金丝弄晴昼。断肠是，飞絮时，绿叶成阴，无个事、一成消瘦。又莫是、东风逐君来，便吹散眉间，一点春皱。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_564", "title": "洞仙歌", "author": "苏轼", "dynasty": "Song", "form": "洞仙歌", "content": "冰肌玉骨，自清凉无汗。水殿风来暗香满。绣帘开、一点明月窥人，人未寝、敧枕钗横鬓乱。起来携素手，庭户无声，时见疏星渡河汉。试问夜如何，夜已三更，金波淡、玉绳低转。但屈指、西风几时来，又不道、流年暗中偷换。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_565", "title": "八声甘州", "author": "苏轼", "dynasty": "Song", "form": "八声甘州", "content": "有情风、万里卷潮来，无情送潮归。问钱塘江上，西兴浦口，几度斜晖。不用思量今古，俯仰昔人非。谁似东坡老，白首忘机。记取西湖西畔，正暮山好处，空翠烟霏。算诗人相得，如我与君稀。约他年、东还海道，愿谢公、雅志莫相违。西州路，不应回首，为我沾衣。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_566", "title": "三部乐", "author": "苏轼", "dynasty": "Song", "form": "三部乐", "content": "美人如月。乍见掩暮云，更增妍绝。算应无恨，安用阴晴圆缺。娇甚空只成愁，待下床又懒，未语先咽。数日不来，落尽一庭红叶。今朝置酒强起，问为谁减动，一分香雪。何事散花却病，维摩无疾。却低眉、惨然不答。唱金缕、一声怨切。堪折便折。且惜取、少年花发。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_567", "title": "阮郎归", "author": "苏轼", "dynasty": "Song", "form": "阮郎归", "content": "绿槐高柳咽新蝉。薰风初入弦。碧纱窗下水沈烟。棋声惊昼眠。微雨过，小荷翻。榴花开欲然。玉盆纤手弄清泉。琼珠碎却圆。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_568", "title": "阮郎归", "author": "苏轼", "dynasty": "Song", "form": "阮郎归", "content": "暗香浮动月黄昏。堂前一树春。东风何事入西邻。儿家常闭门。雪肌冷，玉容真。香腮粉未匀。折花欲寄岭头人。江南日暮云。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_569", "title": "阮郎归", "author": "苏轼", "dynasty": "Song", "form": "阮郎归", "content": "一年三度过苏台。清尊长是开。佳人相问苦相猜。这回来不来。情未尽，老先催。人生真可咍，他年桃李阿谁栽。刘郎双鬓衰。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_570", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "梦中了了醉中醒。只渊明。是前生。走遍人间，依旧却躬耕。昨夜东坡春雨足，乌鹊喜，报新晴。雪堂西畔暗泉鸣。北山倾。小溪横。南望亭丘，孤秀耸曾城。都是斜川当日境，吾老矣，寄馀龄。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_571", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "翠蛾羞黛怯人看。掩霜纨。泪偷弹。且尽一尊，收泪唱阳关。漫道帝城天样远，天易见，见君难。画堂新拘近孤山。曲阑干。为谁安。飞絮落花，春色属明年。欲棹小舟寻旧事，无处问，水连天。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_572", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "凤凰山下雨初晴。水风清。晚霞明。一朵芙蕖，开过尚盈盈。何处飞来双白鹭，如有意，慕娉婷。忽闻江上弄哀筝。苦含情，遣谁听。烟敛云收，依约是湘灵。欲待曲终寻问取，人不见，数峰青。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_573", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "老夫聊发少年狂。左牵黄。右擎苍。锦帽貂裘，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。酒酣胸胆尚开张。鬓微霜。又何妨。持节云中，何日遣冯唐。会挽雕弓如满月，西北望，射天狼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_574", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "天涯流落思无穷。既相逢。却匆匆。携手佳人，和泪折残红。为问东风馀几许，春纵在，与谁同。隋堤三月水溶溶。背归鸿。去吴中。回首彭城，清泗与淮通。寄我相思千点泪，流不到，楚江东。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_575", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "相逢不觉又初寒。对尊前。惜流年。风紧离亭，冰结泪珠圆。雪意留君君不住，从此去，少清欢。转头山下转头看。路漫漫。玉花翻。银海光宽，何处是超然。知道故人相念否，携翠袖，倚朱阑。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_576", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "黄昏犹是雨纤纤。晓开帘。欲平檐。江阔天低，无处认青帘。孤坐冻吟谁伴我，揩病目，拈衰髯。使君留客醉厌厌。水晶盐。为谁甜。手把梅花，东望忆陶潜。雪似故人人似雪，虽可爱，有人嫌。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_577", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "玉人家在凤凰山。水云间。掩门关。门外行人，立马看弓弯。十里春风谁指似，斜日映，绣帘斑。多情好事与君还。闵新鳏。拭馀潸。明月空江，香雾著云鬟。陌上花开春尽也，闻旧曲，破朱颜。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "战争", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_578", "title": "江神子・江城子", "author": "苏轼", "dynasty": "Song", "form": "江神子・江城子", "content": "十年生死两茫茫。不思量。自难忘。千里孤坟，无处话凄凉。纵使相逢应不识，尘满面，鬓如霜。夜来幽梦忽还乡。小轩窗。正梳妆。相顾无言，惟有泪千行。料得年年断肠处，明月夜，短松冈。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_579", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "花褪残红青杏小。燕子飞时，绿水人家绕。枝上柳绵吹又少。天涯何处无芳草。墙里秋千墙外道。墙外行人，墙里佳人笑。笑渐不闻声渐悄。多情却被无情恼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_580", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "一颗樱桃樊素口。不爱黄金，只爱人长久。学画鸦儿犹未就。眉间已作伤春皱。扑蝶西园随伴走。花落花开，渐解相思瘦。破镜重圆人在否。章台折尽青青柳。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_581", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "雨后春容清更丽。只有离人，幽恨终难洗。北固山前三面水。碧琼梳拥青螺髻。一纸乡书来万里。问我何年，真个成归计。白首送春拼一醉。东风吹破千行泪。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_582", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "簌簌无风花自亸。寂寞园林，柳老樱桃过。落日多情还照坐。山青一点横云破。路尽河回千转柁。系缆渔村，月暗孤灯火。凭仗飞魂招楚些。我思君处君思我。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_583", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "灯火钱塘三五夜。明月如霜，照见人如画。帐底吹笙香吐麝。此般风味应无价。寂寞山城人老也。击鼓吹箫，乍入农桑社。火冷灯稀霜露下。昏昏雪意云垂野。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_584", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "帘外东风交雨霰。帘里佳人，笑语如莺燕。深惜今年正月暖。灯光酒色摇金盏。掺鼓《渔阳》挝未遍。舞褪琼钗，汗湿香罗软。今夜何人吟古怨。清诗未就冰生砚。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_585", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "自古涟漪佳绝地。绕郭荷花，欲把吴兴比。倦客尘埃何处洗。真君堂下寒泉水。左海门前酤酒市。夜半潮来，月下孤舟起。倾盖相逢拼一醉。双凫飞去人千里。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_586", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "云水萦回溪上路。叠叠青山，环绕溪东注。月白沙汀翘宿鹭。更无一点尘来处。溪叟相看私自语。底事区区，苦要为官去。尊酒不空田百亩。归来分得闲中趣。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_587", "title": "采桑子", "author": "苏轼", "dynasty": "Song", "form": "采桑子", "content": "多情多感仍多病，多景楼中。尊酒相逢。乐事回头一笑空。停杯且听琵琶语，细拈轻拢。醉脸春融。斜照江天一抹红。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_588", "title": "千秋岁", "author": "苏轼", "dynasty": "Song", "form": "千秋岁", "content": "浅霜侵绿。发少仍新沐。冠直缝，巾横幅。美人怜我老，玉手簪黄菊。秋露重，真珠落袖沾馀馥。坐上人如玉。花映花奴肉。蜂蝶乱，飞相逐。明年人纵健，此会应难复。须细看，晚来月上和银烛。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_589", "title": "苏幕遮", "author": "苏轼", "dynasty": "Song", "form": "苏幕遮", "content": "暑笼晴，风解愠。雨后馀清，暗袭衣裾润。一局选仙逃暑困。笑指尊前、谁向青霄近。整金盆，轮玉笋。凤驾鸾车，谁敢争先进。重五休言升最紧。纵有碧油，到了输堂印。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_590", "title": "永遇乐", "author": "苏轼", "dynasty": "Song", "form": "永遇乐", "content": "长忆别时，景疏楼上，明月如水。美酒清歌，留连不住，月随人千里。别来三度，孤光又满，冷落共谁同醉。卷珠帘，凄然顾影，共伊到明无寐。今朝有客，来从淮上，能道使君深意。凭仗清淮，分明到海，中有相思泪。而今何在，西垣清禁，夜永露华侵被。此时看，回廊晓月，也应暗记。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_591", "title": "永遇乐", "author": "苏轼", "dynasty": "Song", "form": "永遇乐", "content": "明月如霜，好风如水，清景无限。曲港跳鱼，圆荷泻露，寂寞无人见。紞如三鼓，铿然一叶，黯黯梦云惊断。夜茫茫，重寻无处，觉来小园行遍。天涯倦客，山中归路，望断故园心眼。燕子楼空，佳人何在，空锁楼中燕。古今如梦，何曾梦觉，但有旧欢新怨。异时对，黄楼夜景，为余浩叹。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_592", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "绮席才终。欢意犹浓。酒阑时、高兴无穷。共夸君赐，初拆臣封。看分香饼，黄金缕，密云龙。斗赢一水，功敌千锺。觉凉生、两腋清风。暂留红袖，少却纱笼。放笙歌散，庭馆静，略从容。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_593", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "三入承明。四至九卿。问书生、何辱何荣。金张七叶，纨绮貂缨。无汗马事，不献赋，不明经。成都卜肆，寂莫君平。郑子真、岩谷躬耕。寒灰炙手，人重人轻。除竺乾学，得无念，得无名。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_594", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "清夜无尘。月色如银。酒斟时、须满十分。浮名浮利，虚苦劳神。叹隙中驹，石中火，梦中身。虽抱文章，开口谁亲。且陶陶、乐尽天真。几时归去，作个闲人。对一张琴，一壶酒，一溪云。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_595", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "昨夜霜风。先入梧桐。浑无处、回避衰容。问公何事，不语书空。但一回醉，一回病，一回慵。朝来庭下，光阴如箭，似无言、有意伤侬。都将万事，付与千锺。任酒花白，眼花乱，烛花红。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_596", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "携手江村。梅雪飘裙。情何限、处处消魂。故人不见，旧曲重闻。向望湖楼，孤山寺，涌金门。寻常行处，题诗千首，绣罗衫、与拂红尘。别来相忆，知是何人。有湖中月，江边柳，陇头云。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_597", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "一叶轻舟。双桨鸿惊。水天清、影湛波平。鱼翻藻鉴，鹭点烟汀。过沙溪急，霜溪冷，月溪明。重重似画，曲曲如屏。算当年、虚老岩陵。君臣一梦，今古虚名。但远山长，云山乱，晓山清。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "战争", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_598", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "绣帘高卷倾城出。灯前潋滟横波溢。皓齿发清歌。春愁入翠蛾。凄音休怨乱。我已先肠断。遗响下清虚。累累一串珠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_599", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "碧纱微露纤纤玉。朱唇渐暖参差竹。越调变新声。龙吟彻骨清。夜来残酒醒。惟觉霜袍冷。不见敛眉人。胭脂觅旧痕。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_600", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "秋风湖上萧萧雨。使君欲去还留住。今日漫留君。明朝愁杀人。佳人千点泪。洒向长河水。不用敛双蛾。路人啼更多。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_601", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "玉童西迓浮丘伯。洞天冷落秋萧瑟。不用许飞琼。瑶台空月明。清香凝夜宴。借与韦郎看。莫便向姑苏。扁舟下五湖。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_602", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "天怜豪俊腰金晚。故教月向松江满。清景为淹留。从君都占秋。身闲惟有酒。拭问清游首。帝梦已遥思。匆匆归去时。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_603", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "娟娟缺月西南落。相思拨断琵琶索。枕泪梦魂中。觉来眉晕重。华堂堆烛泪。长笛吹《新水》。醉客各西东。应思陈孟公。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_604", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "玉笙不受朱唇暖。离声凄咽胸填满。遗痕几千秋。恩留人不留。他年京国酒。泫泪攀枯柳。莫唱短因缘。长安远似天。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_605", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "画檐初挂弯弯月。孤光未满先忧缺。遥认玉帘钩。天孙梳洗楼。佳人言语好。不顾求新巧。此恨固应知。愿人无别离。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_606", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "风回仙驭云开扇。更阑月堕星河转。枕上梦魂惊。晓檐疏雨零。相逢虽草草。长共天难老。终不羡人间。人间日似年。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_607", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "城隅静女谁人见。先生日夜歌彤管。谁识蔡姬贤。江南顾彦先。先生那久困。汤沐须名郡。惟有谢夫人。从来见拟伦。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_608", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "买田阳羡吾将老。从来只为溪山好。来往一虚舟。聊随物外游。有书仍懒著。水调歌归去。筋力不辞诗。要须风雨时。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_609", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "落花闲院春衫薄。薄衫春院闲花落。迟日恨依依。依依恨日迟。梦回莺舌弄。弄舌莺回梦。邮便问人羞。羞人问便邮。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_610", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "火云凝汗挥珠颗。颗珠挥汗凝云火。琼暖碧纱轻。轻纱碧暖琼。晕腮嫌枕印。印枕嫌腮晕。闲照晚妆残。残妆晚照闲。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_611", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "峤南江浅红梅小。小梅红浅江南峤。窥我向疏篱。篱疏向我窥。老人行即到。到即行人老。离别惜残枝。枝残惜别离。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_612", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "翠鬟斜幔云垂耳。耳垂云幔斜鬟翠。春晚睡昏昏。昏昏睡晚春。细花梨雪坠。坠雪梨花细。颦浅念谁人。人谁念浅颦。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_613", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "柳庭风静人眠昼。昼眠人静风庭柳。香汗薄衫凉。凉衫薄汗香。手红冰碗藕。藕碗冰红手。郎笑藕丝长。长丝藕笑郎。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_614", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "井桐双照新妆冷。冷妆新照双桐井。羞对井花愁。愁花井对羞。影孤怜夜永。永夜怜孤影。楼上不宜秋。秋宜不上楼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_615", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "雪花飞暖融香颊。颊香融暖飞花雪。欺雪任单衣。衣单任雪欺。别时梅子结。结子梅时别。归不恨开迟。迟开恨不归。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_616", "title": "生查子", "author": "苏轼", "dynasty": "Song", "form": "生查子", "content": "三度别君来，此别真迟暮。白尽老髭须，明日淮南去。酒罢月随人，泪湿花如雾。后月逐君还，梦绕湖边路。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_617", "title": "翻香令", "author": "苏轼", "dynasty": "Song", "form": "翻香令", "content": "金炉犹暖麝煤残。惜香更把宝钗翻。重闻处，馀薰在，这一番、气味胜从前。背人偷盖小蓬山。更将沈水暗同然。且图得，氤氲久，为情深、嫌怕断头烟。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_618", "title": "乌夜啼", "author": "苏轼", "dynasty": "Song", "form": "乌夜啼", "content": "莫怪归心甚速，西湖自有蛾眉。若见故人须细说，白发倍当时。小郑非常强记，二南依旧能诗。更有鲈鱼堪切脍，儿辈莫教知。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_619", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "定场贺老今何在。几度新声改。怨声坐使旧声阑。俗耳只知繁手、不须弹。断弦拭问谁能晓。七岁文姬小。拭教弹作辊雷声。应有开元遗老、泪纵横。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_620", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "归心正似三春草。拭著莱衣小。橘怀几日向翁开。怀祖已瞋文度、不归来。禅心已断人间爱。只有平交在。笑论瓜葛一枰同。看取灵光新赋、有家风。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_621", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "湖山信是东南美。一望弥千里。使君能得几回来。便使尊前醉倒、且徘徊。沙河塘里灯初上。水调谁家唱。夜阑风静欲归时。惟有一江明月、碧琉璃。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_622", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "波声拍枕长淮晓。隙月窥人小。无情汴水自东流。只载一船离恨、向西州。竹溪花浦曾同醉。酒味多於泪。谁教风鉴在尘埃。酝造一场烦恼、送人来。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_623", "title": "河满子", "author": "苏轼", "dynasty": "Song", "form": "河满子", "content": "见说岷峨凄怆，旋闻江汉澄清。但觉秋来归梦好，西南自有长城。东府三人最少，西山八国初平。莫负花溪纵赏，何妨药市微行。拭问当垆人在否，空教是处闻名。唱著子渊新曲，应须分外含情。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_624", "title": "哨遍", "author": "苏轼", "dynasty": "Song", "form": "哨遍", "content": "为米折腰，因酒弃家，口体交相累。归去来，谁不遣君归。觉从前皆非今是。露未晞。征夫指予归路，门前笑语喧童稚。嗟旧菊都荒，新松暗老，吾年今已如此。但小窗容膝闭柴扉。策杖看孤云暮鸿飞。云出无心，鸟倦知还，本非有意。噫。归去来兮。我今忘我兼忘世。亲戚无浪语，琴书中有真味。步翠麓崎岖，泛溪窈窕，涓涓暗谷流春水。观草木欣荣，幽人自感，吾生行且休矣。念寓形宇内复几时。不自觉皇皇欲何之。委吾心、去留谁计。神仙知在何处，富贵非吾志。但知临水登山啸咏，自引壶觞自醉。此生天命更何疑。且乘流、遇坎还止。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "战争", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_625", "title": "哨遍", "author": "苏轼", "dynasty": "Song", "form": "哨遍", "content": "睡起画堂，银蒜押帘，珠幕云垂地。初雨歇，洗出碧罗天，正溶溶养花天气。一霎暖风回芳草，荣光浮动，掩皱银塘水。方杏靥匀酥，花鬚吐绣，园林排比红翠。见乳燕捎蝶过繁枝。忽一线炉香逐游丝。昼永人闲，独立斜阳，晚来情味。便乘兴携将佳丽。深入芳菲里。拨胡琴语，轻拢慢捻总伶俐。看紧约罗裙，急趣檀板，霓裳入破惊鸿起。颦月临眉，醉霞横脸，歌声悠扬云际。任满头红雨落花飞。渐鳷鹊楼西玉蟾低。尚徘徊、未尽欢意。君看今古悠悠，浮宦人间世。这些百岁，光阴几日，三万六千而已。醉乡路稳不妨行，但人生、要适情耳。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "战争", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_626", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "我辈情锺，古来谁似龙山宴。而今楚甸。戏马馀飞观。顾谓佳人，不觉秋强半。筝声远。鬓云吹乱。愁入参差雁。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "战争", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_627", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "不用悲秋，今年身健还高宴。江村海甸。总作空花观。尚想横汾，兰菊纷相半。楼船远。白云飞乱。空有年年雁。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_628", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "莫唱阳关，风流公子方终宴。秦山禹甸。缥缈真奇观。北望平原，落日山衔半。孤帆远。我歌君乱。一送西飞雁。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_629", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "醉漾轻舟，信流引到花深处。尘缘相误。无计花间住。烟水茫茫，千里斜阳暮。山无数。乱红如雨。不记来时路。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_630", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "月转乌啼，画堂宫徵生离恨。美人愁闷。不管罗衣褪。清泪斑斑，挥断柔肠寸。嗔人问。背灯偷搵。拭尽残妆粉。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "月", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_631", "title": "人娇", "author": "苏轼", "dynasty": "Song", "form": "人娇", "content": "满院桃花，尽是刘郎未见。於中更、一枝纤软。仙家日月，笑人间春晚。浓睡起，惊飞乱红千片。密意难传，羞容易变。平白地、为伊肠断。问君终日，怎安排心眼。须信道，司空自来见惯。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "月", "爱情"], "emotion": "", "figures": [], "allusions": [], "rela
