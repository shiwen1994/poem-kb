ted_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_632", "title": "人娇", "author": "苏轼", "dynasty": "Song", "form": "人娇", "content": "白发苍颜，正是维摩境界。空方丈、散花何碍。朱唇箸点，更髻鬟生彩。这些个，千生万生只在。好事心肠，著人情态。闲窗下、敛云凝黛。明朝端午，待学纫兰为佩。寻一首好诗，要书裙带。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_633", "title": "人娇", "author": "苏轼", "dynasty": "Song", "form": "人娇", "content": "别驾来时，灯火荧煌无数。向青琐、隙中偷覰。元来便是，共采鸾仙侣。方见了，管须低声说与。百子流苏，千枝宝炬。人间有、洞房烟雾。春来何事，故抛人别处。坐望断，楼中远山归路。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_634", "title": "诉衷情", "author": "苏轼", "dynasty": "Song", "form": "诉衷情", "content": "钱塘风景古来奇。太守例能诗。先驱负弩何在，心已誓江西。花尽后，叶飞时。雨凄凄。若为情绪，更问新官，向旧官啼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_635", "title": "诉衷情", "author": "苏轼", "dynasty": "Song", "form": "诉衷情", "content": "海棠珠缀一重重。清晓近帘栊。胭脂谁与匀淡，偏向脸边浓。看叶嫩，惜花红。意无穷。如花似叶，岁岁年年，共占春风。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_636", "title": "诉衷情", "author": "苏轼", "dynasty": "Song", "form": "诉衷情", "content": "小莲初上琵琶弦。弹破碧云天。分明绣阁幽恨，都向曲中传。肤莹玉，鬓梳蝉。绮窗前。素蛾今夜，故故随人，似斗婵娟。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_637", "title": "更漏子", "author": "苏轼", "dynasty": "Song", "form": "更漏子", "content": "水涵空，山照市。西汉二疏乡里。新白发，旧黄金。故人恩意深。海东头，山尽处。自古客槎来去。槎有信，赴秋期。使君行不归。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_638", "title": "华清引", "author": "苏轼", "dynasty": "Song", "form": "华清引", "content": "平时十月幸兰汤。玉甃琼梁。五家车马如水，珠玑满路旁。翠华一去掩方床。独留烟树苍苍。至今清夜月，依前过缭墙。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_639", "title": "桃源忆故人", "author": "苏轼", "dynasty": "Song", "form": "桃源忆故人", "content": "华胥梦断人何处。听得莺啼红树。几点蔷薇香雨。寂寞闲庭户。暖风不解留花住。片片著人无数。楼上望春归去。芳草迷归路。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_640", "title": "醉落魄・一斛珠", "author": "苏轼", "dynasty": "Song", "form": "醉落魄・一斛珠", "content": "醉醒醒醉。凭君会取这滋味。浓斟琥珀香浮蚁。一到愁肠，别有阳春意。须将幕席为天地。歌前起舞花前睡。从他落魄陶陶里。犹胜醒醒，惹得闲憔悴。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_641", "title": "醉落魄・一斛珠", "author": "苏轼", "dynasty": "Song", "form": "醉落魄・一斛珠", "content": "分携如昨。人生到处萍飘泊。偶然相聚还离索。多病多愁，须信从来错。尊前一笑休辞却。天涯同是伤沦落。故山犹负平生约。西望峨嵋，长羡归飞鹤。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_642", "title": "醉落魄・一斛珠", "author": "苏轼", "dynasty": "Song", "form": "醉落魄・一斛珠", "content": "苍颜华发。故山归计何时决。旧交新贵音书绝。惟有佳人，犹作殷勤别。离亭欲去歌声咽。潇潇细雨凉吹颊。泪珠不用罗巾裛。弹在罗衣，图得见时说。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_643", "title": "醉落魄・一斛珠", "author": "苏轼", "dynasty": "Song", "form": "醉落魄・一斛珠", "content": "轻云微月。二更酒醒船初发。孤城回望苍烟合。公子佳人，不记归时节。巾偏扇坠藤床滑。觉来幽梦无人说。此生飘荡何时歇。家在西南，长作东南别。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_644", "title": "谒金门", "author": "苏轼", "dynasty": "Song", "form": "谒金门", "content": "秋帷里。长漏伴人无寐。低玉枕凉轻绣被。一番秋气味。晓色又侵窗纸。窗外鸡声初起。声断几声还到耳。已明声未已。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_645", "title": "谒金门", "author": "苏轼", "dynasty": "Song", "form": "谒金门", "content": "秋池阁。风傍晓庭帘幕。霜叶未衰吹未落。半惊鸦喜鹊。自笑浮名情薄。似与世人疏略。一片懒心双懒脚。好教闲处著。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_646", "title": "谒金门", "author": "苏轼", "dynasty": "Song", "form": "谒金门", "content": "今夜雨。断送一年残暑。坐听潮声来别浦。明朝何处去。孤负金尊绿醑。来岁今宵圆否。酒醒梦回愁几许。夜阑还独语。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_647", "title": "如梦令", "author": "苏轼", "dynasty": "Song", "form": "如梦令", "content": "水垢何曾相受。细看两俱无有。寄语揩背人，尽日劳君挥肘。轻手。轻手。居士本来无垢。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_648", "title": "如梦令", "author": "苏轼", "dynasty": "Song", "form": "如梦令", "content": "自净方能净彼。我自汗流呀气。寄语澡浴人，且共肉身游戏。但洗。但洗。俯为人间一切。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_649", "title": "如梦令", "author": "苏轼", "dynasty": "Song", "form": "如梦令", "content": "为向东坡传语。人在玉堂深处。别后有谁来，雪压小桥无路。归去。归去。江上一犁春雨。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_650", "title": "如梦令", "author": "苏轼", "dynasty": "Song", "form": "如梦令", "content": "手种堂前桃李。无限绿阴青子。帘外百舌儿，惊起五更春睡。居士。居士。莫望小桥流水。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_651", "title": "阳关曲", "author": "苏轼", "dynasty": "Song", "form": "阳关曲", "content": "暮云收尽溢清寒。银汗无声转玉盘。此声此夜不长好，明月明年何处看。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_652", "title": "阳关曲", "author": "苏轼", "dynasty": "Song", "form": "阳关曲", "content": "受降城下紫髯郎。戏马台南旧战场。恨君不取契丹首，金甲牙旗归故乡。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "战争", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_653", "title": "阳关曲", "author": "苏轼", "dynasty": "Song", "form": "阳关曲", "content": "济南春好雪初晴。才到龙山马足轻。使君莫忘霅溪女，还作《阳关》肠断声。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "战争", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_654", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "郑庄好客。容我尊前先堕帻。落笔生风。籍籍声名不负公。高山白早。莹骨冰肤那解老。从此南徐。良夜清风月满湖。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_655", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "云鬟倾倒。醉倚阑干风月好。凭仗相扶。误入仙家碧玉壶。连天衰草。下走湖南西去道。一舸姑苏。便逐鸱夷去得无。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_656", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "闽溪珍献。过海云帆来似箭。玉座金盘。不贡奇葩四百年。轻红酿白。雅称佳人纤手擘。骨细肌香。恰是当年十八娘。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_657", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "贤哉令尹。三仕已之无喜愠。我独何人。犹把虚名玷搢绅。不如归去。二顷良田无觅处。归去来兮。待有良田是几时。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_658", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "玉觞无味。中有佳人千点泪。学道忘忧。一念还成不自由。如今未见。归去东园花似霰。一语相开。匹似当初本不来。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_659", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "春光亭下。流水如今何在也。岁月如梭。白首相看拟奈何。故人重见。世事年来千万变。官况阑珊。惭愧青松守岁寒。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_660", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "惟熊佳梦。释氏老君亲抱送。壮气横秋。未满三朝已食牛。犀钱玉果。利市平分沾四坐。多谢无功。此事如何到得侬。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_661", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "晓来风细。不会鹊声来报喜。却羡寒梅。先觉春风一夜来。香笺一纸。写尽回文机上意。欲卷重开。读遍千回与万回。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_662", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "天台旧路。应恨刘郎来又去。别酒频倾。忍听《阳关》第四声。刘郎未老。怀恋仙乡重得到。只恐因循。不见如今劝酒人。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_663", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "双龙对起。白甲苍髯烟雨里。疏影微香。下有幽人昼梦长。湖风清软。双鹊飞来争噪晚。翠飐红轻。时下凌宵百尺英。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_664", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "琵琶绝艺。年纪都来十一二。拨弄么弦。未解将心指下传。主人瞋小。欲向东风先醉倒。已属君家。且更从容等待他。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_665", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "春牛春杖。无限春风来海上。便与春工。染得桃红似肉红。春幡春胜。一阵春风吹酒醒。不似天涯。卷起杨花似雪花。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_666", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "云容皓白。破晓玉英纷似织。风力无端。欲学杨花更耐寒。相如未老。梁苑犹能陪俊少。莫惹闲愁。且折江梅上小楼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_667", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "玉房金蕊。宜在玉人纤手里。淡月朦胧。更有微微弄袖风。温香熟美。醉慢云鬟垂两耳。多谢春工。不是花红是玉红。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_668", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "春庭月午。摇荡香醪光欲舞。步转迥廊。半落梅花婉娩香。轻云薄雾。总是少年行乐处。不似秋光。只与离人照断肠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_669", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "天然宅院。赛了千千并万万。说与贤知。表德元来是胜之。今来十四。海里猴儿奴子是。要赌休痴。六双骰儿六点儿。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_670", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "风卷珠帘自上钩。萧萧乱叶报新秋。独携纤手上高楼。缺月向人舒窈窕，三星当户照绸缪。香生雾縠见纤柔。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_671", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "山下兰芽短浸溪。松间沙路净无泥。萧萧暮雨子规啼。谁道人生无再少，门前流水尚能西。休将白发唱黄鸡。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_672", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "西塞山边白鹭飞。散花洲外片帆微。桃花流水鳜鱼肥。自庇一身青箬笠，相随到处绿蓑衣。斜风细雨不须归。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_673", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "覆块青青麦未苏。江南云叶暗随车。临皋烟景世间无。雨脚半收檐断线，雪林初下瓦疏珠。归来冰颗乱黏须。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_674", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "醉梦醺醺晓未苏。门前辘辘使君车。扶头一盏怎生无。废圃寒蔬挑翠羽，小槽春酒冻真珠。清香细细嚼梅须。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_675", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "雪里餐毡例姓苏。使君载酒为回车。天寒酒色转头无。荐士已闻飞鹗表，报恩应不用蛇珠。醉中还许揽桓须。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_676", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "半夜银山上积苏。朝来九陌带随车。涛江烟渚一时无。空腹有诗衣有结，湿薪如桂米如珠。冻吟谁伴拈髭须。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_677", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "万顷风涛不记苏。雪晴江上麦千车。但令人饱我愁无。翠袖倚风萦柳絮，绛唇得酒烂樱珠。尊前呵手镊霜须。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_678", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "珠桧丝杉冷欲霜。山城歌舞助凄凉。且餐山色饮湖光。共挽朱幡留半日，强揉青蕊作重阳。不知明日为谁黄。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_679", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "霜鬓真堪插拒霜。哀弦危柱作《伊凉》。暂时流转为风光。未遣清尊空北海，莫因《长笛》赋山阳。金钗玉腕泻鹅黄。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_680", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "傅粉郎君又粉奴。莫教施粉与施朱。自然冰玉照香酥。有客能为《神女赋》，凭君送与雪儿书。梦魂东去觅桑榆。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_681", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "菊暗荷枯一夜霜。新苞绿叶照林光。竹篱茅舍出青黄。香雾噀人惊半破，清泉流齿怯初尝。吴姬三日手犹香。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_682", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "雪颔霜髯不自惊。更将翦采发春荣。羞颜未醉已先赪。莫唱黄鸡并白发，且呼张丈唤殷兄。有人归去欲卿卿。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_683", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "料峭东风翠幕惊。云何不饮对公荣。水晶盘莹玉鳞赪。花影莫孤三夜月，朱颜未称五年兄。翰林子墨主人卿。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_684", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "照日深红暖见鱼。连溪绿暗晚藏乌。黄童白叟聚睢盱。糜鹿逢人虽未惯，猿揉闻鼓不须呼。归家说与采桑姑。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_685", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "旋抹红妆看使君。三三五五棘篱门。相挨踏破蒨罗裙。老幼扶携收麦社，乌鸢翔舞赛神村。道逢醉叟卧黄昏。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_686", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "麻叶层层苘叶光。谁家煮蚕一村香。隔篱娇语络丝娘。垂白杖藜抬醉眼，捋青捣麨软饥肠。问言豆叶几时黄。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_687", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "簌簌衣巾落枣花。村南村北响缲车。牛衣古柳卖黄瓜。酒困路长惟欲睡，日高人渴漫思茶。敲门试问野人家。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_688", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "软草平莎过雨新。轻沙走马路无尘。何时收拾耦耕身。日暖桑麻光似泼，风来蒿艾气如薰。使君元是此中人。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_689", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "道字娇讹苦未成。未应春阁梦多情。朝来何事绿鬟倾。彩索身轻长趁燕，红窗睡重不闻莺。困人天气近清明。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_690", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "缥缈危楼紫翠间。良辰乐事古难全。感时怀旧独凄然。璧月琼枝空夜夜，菊花人貌自年年。不知来岁与谁看。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_691", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "桃李溪边驻画轮。鹧鸪声里倒清尊。夕阳虽好近黄昏。香在衣裳妆在臂，水连芳草月连云。几时归去不销魂。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_692", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "四面垂杨十里荷。问云何处最花多。画楼南畔夕阳和。天气乍凉人寂寞，光阴须得酒消磨。且来花里听笙歌。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_693", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "一别姑苏已四年。秋风南浦送归船。画帘重见水中仙。霜鬓不须催我老，杏花依旧驻君颜。夜阑相对梦魂间。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_694", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "惟见眉间一点黄。诏书催发羽书忙。从教娇泪洗红妆。上殿云宵生羽翼，论兵齿颊带风霜。归来衫袖有天香。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "战争", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_695", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "长记鸣琴子贱堂。朱颜绿发映垂杨。如今秋鬓数茎霜。聚散交游如梦寐，升沈闲事莫思量。仲卿终不避桐乡。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_696", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "风压轻云贴水飞。乍晴池馆燕争泥。沈郎多病不胜衣。沙上不闻鸿雁信，竹间时听鹧鸪啼。此情惟有落花知。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "战争", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_697", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "罗袜空飞洛浦尘。锦袍不见谪仙人。携壶藉草亦天真。玉粉轻黄千岁药，雪花浮动万家春。醉归江路野梅新。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "闺怨"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_698", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "白雪清词出坐间。爱君才器两俱全。异乡风景却依然。可恨相逢能几日，不知重会是何年。茱萸仔细更重看。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_699", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "细雨斜风作晓寒。淡烟疏柳媚晴滩。入淮清洛渐漫漫。雪沫乳花浮午盏，蓼茸蒿笋试春盘。人间有味是清欢。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_700", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "门外东风雪洒裾。山头回首望三吴。不应弹铗为无鱼。上党从来天下脊，先生元是古之儒。时平不用鲁连书。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_701", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "惭愧今年二麦丰。千畦细浪舞晴空。化工馀力染夭红。归去山公应倒载，阑街拍手笑儿童。甚时名作锦薰笼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_702", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "芍药樱桃两斗新。名园高会送芳辰。洛阳初夏广陵春。红玉半开菩萨面，丹砂浓点柳枝唇。尊前还有个中人。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_703", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "学画鸦儿正妙年。阳城下蔡困嫣然。凭君莫唱短因缘。雾帐吹笙香袅袅，霜庭按舞月娟娟。曲终红袖落双缠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_704", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "一梦江湖费五年。归来风物故依然。相逢一醉是前缘。迁客不应常眊矂，使君为出小婵娟。翠鬟聊著小诗缠。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_705", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "轻汗微微透碧纨。明朝端午浴芳兰。流香涨腻满晴川。彩线轻缠红玉臂，小符斜挂绿云鬟。佳人相见一千年。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_706", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "徐邈能中酒圣贤。刘伶席地幕青天。潘郎白璧为谁连。无可奈何新白发，不如归去旧青山。恨无人借买山钱。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_707", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "倾盖相逢胜白头。故山空复梦松楸。此心安处是菟裘。卖剑买牛吾欲老，乞浆得酒更何求。愿为辞社宴春秋。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_708", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "炙手无人傍屋头。萧萧晚雨脱梧楸。谁怜季子敞貂裘。顾我已无当世望，似君须向古人求。岁寒松柏肯惊秋。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_709", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "画隼横江喜再游。老鱼跳槛识清讴。流年未肯付东流。黄菊篱边无怅望，白云乡里有温柔。挽回霜鬓莫教休。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_710", "title": "双荷叶・忆秦娥", "author": "苏轼", "dynasty": "Song", "form": "双荷叶・忆秦娥", "content": "双溪月。清光遍照双荷叶。双荷叶。红心未偶，绿衣偷结。背风迎雨流珠滑。轻舟短棹先秋折。先秋折。烟鬟未上，玉杯微缺。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_711", "title": "皂罗特髻", "author": "苏轼", "dynasty": "Song", "form": "皂罗特髻", "content": "采菱拾翠，算似此佳名，阿谁消得。采菱拾翠，称使君知客。千金买、采菱拾翠，更罗裙、满把珍珠结。采菱拾翠，正髻鬟初合。真个、采菱拾翠，但深怜轻拍。一双手、采菱拾翠，绣衾下、抱著俱香滑。采菱拾翠，待到京寻觅。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_712", "title": "调笑令", "author": "苏轼", "dynasty": "Song", "form": "调笑令", "content": "渔父。渔父。江上微风细雨。青蓑黄箬裳衣。红酒白鱼暮归。归暮。归暮。长笛一声何处。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_713", "title": "调笑令", "author": "苏轼", "dynasty": "Song", "form": "调笑令", "content": "归雁。归雁。饮啄江南南岸。将飞却下盘桓。塞外春来苦寒。寒苦。寒苦。藻荇欲生且住。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_714", "title": "荷华媚", "author": "苏轼", "dynasty": "Song", "form": "荷华媚", "content": "霞苞电荷碧。天然地、别是风流标格。重重青盖下，千娇照水，好红红白白。每怅望、明月清风夜，甚低迷不语，妖邪无力。终须放、船儿去，清香深处住，看伊颜色。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_715", "title": "青玉案", "author": "苏轼", "dynasty": "Song", "form": "青玉案", "content": "三年枕上吴中路。遣黄耳、随君去。若到松江呼小渡。莫惊鸥鹭，四桥尽是，老子经行处。辋川图上看春暮。常记高人右丞句。作个归期天已许。春衫犹是，小蛮针线，曾湿西湖雨。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_716", "title": "渔家傲", "author": "苏轼", "dynasty": "Song", "form": "渔家傲", "content": "些小白须何用染。几人得见星星点。作郡浮光虽似箭。君莫厌。也应胜我三年贬。我欲自嗟还不敢。向来三郡宁非忝。婚嫁事稀年冉冉。知有渐。千钧重担从头减。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_717", "title": "江城子", "author": "苏轼", "dynasty": "Song", "form": "江城子", "content": "前瞻马耳九仙山。碧连天。晚云闲。城上高台，真个是超然。莫使匆匆云雨散，今夜里，月婵娟。小溪鸥鹭静联拳。去翩翩。点轻烟。人事凄凉，回首便他年。莫忘使君歌笑处，垂柳下，矮槐前。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_718", "title": "江城子", "author": "苏轼", "dynasty": "Song", "form": "江城子", "content": "墨云拖雨过西楼。水东流。晚烟收。柳外残阳，回照动帘钩。今夜巫山真个好，花未落，酒新篘。美人微笑转星眸。月华羞。捧金瓯。歌扇萦风，吹散一春愁。拭问江南诸伴侣，谁似我，醉扬州。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_719", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "未倦长卿游。漫舞夭歌烂不收。不是使君能矫世，谁留。教有琼梳脱麝油。香粉镂金球。花艳红笺笔欲流。从此丹唇并皓齿，清柔。唱遍山东一百州。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_720", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "绣鞅玉环游。灯晃帘疏笑却收。久立香车催欲上，还留。更且檀唇点杏油。花遍六么球。面旋回风带雪流。春入腰肢金缕细，轻柔。种柳应须柳柳州。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_721", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "娟娟侵鬓妆痕浅。双颦相媚弯如翦。一瞬百般宜。无论笑与啼。酒阑思翠被。特故腾腾地。生怕促归轮。微波先注人。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_722", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "涂香莫惜莲承步。长愁罗袜凌波去。只见舞迥风。都无行处踪。偷穿宫样稳。并立双趺困。纤妙说应难。须从掌上看。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["闺怨"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_723", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "玉环坠耳黄金饰。轻衫罩体香罗碧。缓步困春醪。春融脸上桃。花钿从委地。谁与郎为意。常爱月华清。此时憎月明。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_724", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "别酒劝君君一醉。清润潘郎，又是何郎婿。记取钗头新利市。莫将分付东邻子。回首长安佳丽地。三十年前，我是风流帅。为向青楼寻旧事。花枝缺处馀名字。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_725", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "泛泛东风初破五。江柳微黄，万万千千缕。佳气郁葱来绣户。当年江上生奇女。一盏寿觞谁与举。三个明珠，膝上王文度。放尽穷鳞看圉圉。天公为下曼陀雨。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_726", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "入袂轻风不破尘。玉簪犀璧醉佳辰。一番红粉为谁新。团扇只堪题往事，新丝那解系行人。酒阑滋味思残春。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_727", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "几共查梨到雪霜。一经题品便生光。木奴何处避雌黄。北客有来初未识，南金无价喜新尝。含滋嚼句齿牙香。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_728", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "山色横侵蘸晕霞。湘川风静吐寒花。远林屋散尚啼鸦。梦到故园多少路，酒醒南望隔天涯。月明千里照平沙。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_729", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "神闲意定。万籁收声天地静。玉指冰弦。未动宫商意已传。悲风流水。写处寥寥千古意。归去无眠。一夜馀音在耳边。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_730", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "银铮旋品。不用缠头千尺锦。妙思如泉。一洗闲愁十五年。为公少止。起舞属公《公莫》起。风里银山。摆撼鱼龙我自闲。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_731", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "柔和性气。雅称佳名呼懿懿。解舞能讴。绝妙年中有品流。眉长眼细。淡淡梳妆新绾髻。懊恼风情。春著花枝百态生。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_732", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "莺初解语。最是一年春好处。微雨如酥。草色遥看近却无。休辞醉倒。花不看开人易老。莫待春回。颠倒红英间绿苔。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_733", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "江南游女。问我何年归得去。雨细风微。雨足如霜挽纻衣。江亭夜语。喜见京华新样舞。莲步轻飞。迁客今朝始是归。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_734", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "娇多媚。体柳轻盈千万态。殢主尤宾。敛黛含嚬喜又嗔。徐君乐饮。笑谑从伊情意恁。脸嫩敷红。花倚朱阑裹住风。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_735", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "双鬟绿坠。娇眼横波眉黛翠。妙舞蹁跹。掌上身轻意态妍。曲穷力困。笑倚人旁香喘喷。老大逢欢。昏眼犹能仔细看。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_736", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "天真雅丽。容态温柔心性慧。响亮歌喉。遏住行云翠不收。妙词佳曲。啭出新声能断续。重客多情。满劝金卮玉手擎。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_737", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "见说东园好，能消北客愁。虽非吾土且登楼。行尽江南南岸、此淹留。短日明枫缬，清霜暗菊逑。流年回首付东流。凭仗挽回潘鬓、莫教秋。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_738", "title": "如梦令", "author": "苏轼", "dynasty": "Song", "form": "如梦令", "content": "城上层楼叠巘。城下清淮古汴。举手揖吴云，人与暮天俱远。魂断。魂断。后夜松江月满。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_739", "title": "瑞鹧鸪", "author": "苏轼", "dynasty": "Song", "form": "瑞鹧鸪", "content": "城头月落尚啼乌。朱舰红船早满湖。鼓吹未容迎五马，水云先已漾双凫。映山黄帽螭头舫，夹岸青烟鹊尾炉。老病逢春只思睡，独求僧榻寄须臾。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_740", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "谁道东阳都瘦损，凝然点漆精神。瑶林终自隔风尘，试看披鹤氅，仍是谪仙人。省可清言挥玉麈，真须保器全真。风流何似道家纯。不应同蜀客，惟爱卓文君。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_741", "title": "少年游", "author": "苏轼", "dynasty": "Song", "form": "少年游", "content": "玉肌铅粉傲秋霜。准拟凤呼凰。伶伦不见，清香未吐，且糠秕吹扬。到处成双君独只，空无数、烂文章。一点香檀，谁能借箸，无复似张良。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_742", "title": "一斛珠", "author": "苏轼", "dynasty": "Song", "form": "一斛珠", "content": "洛城春晚。垂杨乱掩红楼半。小池轻浪纹如篆。烛下花前，曾醉离歌宴。自惜风流云雨散。关山有限情无限。待君重见寻芳伴。为说相思、目断西楼燕。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_743", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "闲倚胡床，庾公楼外峰千朵。与谁同坐。明月清风我。别乘一来，有唱应须和。还知麽。自从添个。风月平分破。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_744", "title": "点绛唇", "author": "苏轼", "dynasty": "Song", "form": "点绛唇", "content": "红杏飘香，柳含烟翠拖轻缕。水边朱户。尽卷黄昏雨。烛影摇风，一枕伤春绪。归不去。凤楼何处。芳草迷归路。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_745", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "持杯遥劝天边月。愿月圆无缺。持杯复更劝花枝。且愿花枝长在、莫离披。持杯月下花前醉。休问荣枯事。此欢能有几人知。对酒逢花不饮、待何时。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_746", "title": "天仙子", "author": "苏轼", "dynasty": "Song", "form": "天仙子", "content": "走马探花花发未。人与化工俱不易。千回来绕百回看，蜂作婢。莺为使。谷雨清明空屈指。白发卢郎情未已。一夜翦刀收玉蕊。尊前还对断肠红，人有泪。花无意。明日酒醒应满地。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒", "战争", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_747", "title": "满庭芳", "author": "苏轼", "dynasty": "Song", "form": "满庭芳", "content": "归去来兮，清溪无底，上有千仞嵯峨。画楼东畔，天远夕阳多。老去君恩未报，空回首、弹铗悲歌。船头转，长风万里，归马驻平坡。无何。何处有，银潢尽处，天女停梭。问何事人间，久戏风波。顾谓同来稚子，应烂汝、腰下长柯。青衫破，群仙笑我，千缕挂烟蓑。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_748", "title": "南乡子", "author": "苏轼", "dynasty": "Song", "form": "南乡子", "content": "千骑试春游。小雨如酥落便收。能使江东归老客，迟留。白酒无声滑泻油。飞火乱星逑。浅黛横波翠欲流。不似白云乡外冷，温柔。此去淮南第一州。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_749", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "缥缈红妆照浅溪。薄云疏雨不成泥。送君何处古台西。废沼夜来秋水满，茂林深处晚莺啼。行人肠断草凄迷。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_750", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "阳羡姑苏已买田。相逢谁信是前缘。莫教便唱水如天。我作洞霄君作守，白头相对故依然。西湖知有几同年。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_751", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "空床响琢。花上春禽冰上雹。醉梦尊前。惊起湖风入坐寒。转关镬索。春水流弦霜入拨。月堕更阑。更请宫高奏独弹。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_752", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "回风落景。散乱东墙疏竹影。满坐清微。入袖寒泉不湿衣。梦回酒醒。百尺飞澜鸣碧井。雪洒冰麾。散落佳人白玉肌。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_753", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "海南奇宝。铸出团团如栲栳。曾到昆仑。乞得山头玉女盆。绛州王老。百岁痴顽推不倒。海口如门。一派黄流已电奔。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_754", "title": "行香子", "author": "苏轼", "dynasty": "Song", "form": "行香子", "content": "北望平川。野水荒湾。共寻春、飞步孱颜。和风弄袖，香雾萦鬟。正酒酣时，人语笑，白云间。飞鸿落照，相将归去，澹娟娟、玉宇清闲。何人无事，宴坐空山。望长桥上，灯火乱，使君还。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_755", "title": "画堂春", "author": "苏轼", "dynasty": "Song", "form": "画堂春", "content": "柳花飞处麦摇波。晚湖净鉴新磨。小舟飞棹去如梭。齐唱采菱歌。平野水云溶漾，小楼风日晴和。济南何在暮云多。归去奈愁何。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_756", "title": "浣溪沙", "author": "苏轼", "dynasty": "Song", "form": "浣溪沙", "content": "花满银塘水漫流。犀槌玉板奏《凉州》。顺风环佩过秦楼。远汉碧云轻漠漠，今宵人在鹊桥头。一声敲彻绛河秋。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_757", "title": "好事近", "author": "苏轼", "dynasty": "Song", "form": "好事近", "content": "烟外倚危楼，初见远灯明灭。却跨玉虹归去，看洞天星月。当时张范风流在，况一尊浮雪。莫问世间何事，与剑头微吷。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_758", "title": "占春芳", "author": "苏轼", "dynasty": "Song", "form": "占春芳", "content": "红杏了，夭桃尽，独自占春芳。不比人间兰麝，自然透骨生香。对酒莫相忘。似佳人、兼合明光。只忧长笛吹花落，除是宁王。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_759", "title": "南歌子", "author": "苏轼", "dynasty": "Song", "form": "南歌子", "content": "云鬓裁新绿，霞衣曳晓红。待歌凝立翠筵中。一朵彩云何事、下巫峰。趁拍鸾飞镜，回身燕漾空。莫翻红袖过帘栊。怕被杨花句引、嫁东风。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_760", "title": "浪淘沙", "author": "苏轼", "dynasty": "Song", "form": "浪淘沙", "content": "昨日出东城。拭探春情。墙头红杏暗如倾。槛内群芳芽未吐，早已回春。绮陌敛香尘。雪霁前村。东君用意不辞辛。料想春光先到处，吹绽梅英。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_761", "title": "木兰花令", "author": "苏轼", "dynasty": "Song", "form": "木兰花令", "content": "元宵似是欢游好。何况公庭民讼少。万家游赏上春台，十里神仙迷海岛。平原不似高阳傲。促席雍容陪语笑。坐中有客醉多情，不惜玉山拼醉倒。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_762", "title": "木兰花令", "author": "苏轼", "dynasty": "Song", "form": "木兰花令", "content": "经旬未识东君信。一夕薰风来解愠。红绡衣薄麦秋寒，绿绮韵低梅雨润。瓜头绿染山光嫩。弄色金桃新傅粉。日高慵卷水晶帘，犹带春醪红玉困。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_763", "title": "木兰花令", "author": "苏轼", "dynasty": "Song", "form": "木兰花令", "content": "高平四面开雄垒。三月风光初觉媚。园中桃李使君家，城上亭台游客醉。歌翻《杨柳》金尊沸。饮散凭阑无限意。云深不见玉关遥，草细山重残照里。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_764", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "冰肌自是生来瘦。那更分飞后。日长帘暮望黄昏。及至黄昏时候、转销魂。君还知道相思苦。怎忍抛奴去。不辞迢递过关山。只恐别郎容易、见郎难。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_765", "title": "虞美人", "author": "苏轼", "dynasty": "Song", "form": "虞美人", "content": "深深庭院清明过。桃李初红破。柳丝搭在玉阑干。帘外潇潇微雨、做轻寒。晚晴台榭增明媚。已拼花前醉。更阑人静月侵廊。独自行来行去、好思量。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_766", "title": "临江仙", "author": "苏轼", "dynasty": "Song", "form": "临江仙", "content": "昨夜渡江何处宿，望中疑是秦淮。月明谁起笛中哀。多情王谢女，相逐过江来。云雨未成还又散，思量好事难谐。凭陵急桨两相催。想伊归去后，应似我情怀。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_767", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "春事阑珊芳草歇。客里风光，又过清明节。小院黄昏人忆别。落红处处闻啼鴂。咫尺江山分楚越。目断魂销，应是音尘绝。梦破五更心欲折。角声吹落梅花月。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_768", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "记得画屏初会遇。好梦惊回，望断高唐路。燕子双飞来又去。纱窗几度春光暮。那日绣帘相见处。低眼佯行，笑整香云缕。敛尽春山羞不语。人前深意难轻诉。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_769", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "昨夜秋风来万里。月上屏帏，冷透人衣袂。有客抱衾愁不寐。那堪玉漏长如岁。羁舍留连归计未。梦断魂销，一枕相思泪。衣带渐宽无别意。新书报我添憔悴。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "月", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_770", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "雨霰疏疏经泼火。巷陌秋千。犹未清明过。杏子梢头香蕾破。淡红褪白胭脂涴。苦被多情相折挫。病绪厌厌，浑似年时个。绕遍回廊还独坐。月笼云暗重门锁。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_771", "title": "蝶恋花", "author": "苏轼", "dynasty": "Song", "form": "蝶恋花", "content": "蝶懒莺慵春过半。花落狂风，小院残红满。午醉未醒红日晚。黄昏帘暮无人卷。云鬓蓬松眉黛浅。总是愁媒，欲诉谁消遣。未信此情难系绊。杨花犹有东风管。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_772", "title": "渔家傲", "author": "苏轼", "dynasty": "Song", "form": "渔家傲", "content": "临水纵横回晚鞚。归来转觉情怀动。梅笛烟中闻几弄。秋阴重。西山雪淡云凝冻。美酒一杯谁与共。尊前舞雪狂歌送。腰跨金鱼旌旆拥。将何用。只堪妆点浮生梦。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "送别", "山水", "酒", "怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_773", "title": "江城子", "author": "苏轼", "dynasty": "Song", "form": "江城子", "content": "腻红匀脸衬檀唇。晚妆新。暗伤春。手拈花枝，谁会两眉颦。连理带头双□□，留待与、个中人。淡烟笼月绣帘阴。画堂深。夜沈沈。谁道□□，□系得人心。一自绿窗偷见后，便憔悴、到如今。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_774", "title": "祝英台近", "author": "苏轼", "dynasty": "Song", "form": "祝英台近", "content": "挂轻帆，飞急桨，还过钓台路。酒病无聊，敧枕听鸣橹。断肠簇簇云山，重重烟树，回首望、孤城何处。闲离阻。谁念萦损襄王，何曾梦云雨。旧恨前欢，心事两无据。要知欲见无由，痴心犹自，倩人道、一声传语。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_775", "title": "雨中花慢", "author": "苏轼", "dynasty": "Song", "form": "雨中花慢", "content": "邃院重帘何处，惹得多情，愁对风光。睡起酒阑花谢，蝶乱蜂忙。今夜何人，吹笙北岭，待月西厢。空怅望处，一株红杏，斜倚低墙。羞颜易变，傍人先觉，到处被著猜防。谁信道，些儿恩爱，无限凄凉。好事若无间阻，幽欢却是寻常。一般滋味，就中香美，除是偷尝。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "酒", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_776", "title": "雨中花慢", "author": "苏轼", "dynasty": "Song", "form": "雨中花慢", "content": "嫩脸羞蛾，因甚化作行云，却返巫阳。但有寒灯孤枕，皓月空床。长记当初，乍谐云雨，便学鸾凰。又岂料、正好三春桃李，一夜风霜。丹青□画，无言无笑，看了漫结愁肠。襟袖上，犹存残黛，渐减馀香。一自醉中忘了，奈何酒后思量。算应付你，枕前珠泪，万点千行。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_777", "title": "念奴娇", "author": "苏轼", "dynasty": "Song", "form": "念奴娇", "content": "凭高眺远，见长空万里，云无留迹。桂魄飞来光射处，冷浸一天秋碧。玉宇琼楼，乘鸾来去，人在清凉国。江山如画，望中烟树历历。我醉拍手狂歌，举杯邀月，对影成三客。起舞徘徊风露下，今夕不知何夕。便欲乘风，翻然归去，何用骑鹏翼。水晶宫里，一声吹断横笛。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_778", "title": "水龙吟", "author": "苏轼", "dynasty": "Song", "form": "水龙吟", "content": "小沟东接长江，柳堤苇岸连云际。烟村潇洒，人闲一哄，渔樵早市。永昼端居，寸阴虚度，了成何事。但丝莼玉藕，珠粳锦鲤，相留恋，又经岁。因念浮丘旧侣，惯瑶池、羽觞沈醉。青鸾歌舞，铢衣摇曳，壶中天地。飘堕人间，步虚声断，寒露风细。抱素琴，独向银蟾影里，此怀难寄。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_779", "title": "水龙吟", "author": "苏轼", "dynasty": "Song", "form": "水龙吟", "content": "露寒烟冷蒹葭老，天外征鸿寥唳。银河秋晚，长门灯悄，一声初至。应念潇湘，岸遥人静，水多菰米。□望极平田，徘徊欲下，依前被、风惊起。须信衡阳万里。有谁家、锦书遥寄。万重云外，斜行横阵，才疏又缀。仙掌月明，石头城下，影摇寒水。念征衣未捣，佳人拂杵，有盈盈泪。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "月", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_780", "title": "渔父・渔歌子", "author": "苏轼", "dynasty": "Song", "form": "渔父・渔歌子", "content": "渔父饮，谁家去。鱼蟹一时分付。酒无多少醉为期，彼此不论钱数。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_781", "title": "渔父・渔歌子", "author": "苏轼", "dynasty": "Song", "form": "渔父・渔歌子", "content": "渔父醉，蓑衣舞。醉里却寻归路。轻舟短棹任斜横，醒后不知何处。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_782", "title": "渔父・渔歌子", "author": "苏轼", "dynasty": "Song", "form": "渔父・渔歌子", "content": "渔父醒，春江午。梦断落花飞絮。酒醒还醉醉还醒，一笑人间今古。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_783", "title": "渔父・渔歌子", "author": "苏轼", "dynasty": "Song", "form": "渔父・渔歌子", "content": "渔父笑，轻鸥举。漠漠一江风雨。江边骑马是官人，借我孤舟南渡。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "战争", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_784", "title": "醉翁操", "author": "苏轼", "dynasty": "Song", "form": "醉翁操", "content": "琅然。清圜。谁弹。响空山。无言。惟翁醉中知其天。月明风露娟娟。人未眠。荷蒉过山前。曰有心也哉此贤。醉翁啸咏，声和流泉。醉翁去后，空有朝吟夜怨。山有时而童巅。水有时而回川。思翁无岁年。翁今为飞仙。此意在人间。拭听徽外三两弦。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "酒", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_785", "title": "导引", "author": "苏轼", "dynasty": "Song", "form": "导引", "content": "帝城父老，三岁望尧心。天远玉楼深。龙颜仿佛笙箫远，肠断属车音。离宫春色琐瑶林。云阙海沈沈。遗民犹唱当时曲，秋雁起汾阴。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_786", "title": "导引", "author": "苏轼", "dynasty": "Song", "form": "导引", "content": "经文纬武，十有九年中。遗烈震羌戎。渭桥夹道千君长，犹是建元功。西瞻温洛与神崧。莲宇照琼宫。人间俯仰成今古，流泽自无穷。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["怀古"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_787", "title": "瑶池燕", "author": "苏轼", "dynasty": "Song", "form": "瑶池燕", "content": "飞花成阵。春心困。寸寸。别肠多少愁闷。无人问。偷啼自搵。残妆粉。抱瑶琴、寻出新韵。玉纤趁。南风来解幽愠。低云鬟、眉峰敛晕。娇和恨。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_788", "title": "千秋岁", "author": "苏轼", "dynasty": "Song", "form": "千秋岁", "content": "岛边天外。未老身先退。珠泪溅，丹衷碎。声摇苍玉佩。色重黄金带。一万里。斜阳正与长安对。道远谁云会。罪大天能盖。君命重，臣节在。新恩犹可觊。旧学终难改。吾已矣。乘桴且恁浮於海。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_789", "title": "减字木兰花", "author": "苏轼", "dynasty": "Song", "form": "减字木兰花", "content": "凭谁妙笔。横扫素缣三百尺。天下应无。此是钱塘湖上图。一般奇绝。云淡天高秋夜月。费尽丹青。只这些儿画不成。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_790", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "高安更过几重山。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_791", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "过湖携手屡沾襟。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_792", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "谁教幽梦里，插他花。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_793", "title": "菩萨蛮", "author": "苏轼", "dynasty": "Song", "form": "菩萨蛮", "content": "湿云不动溪桥冷。嫩寒初透东风影。桥下水声长。一枝和月香。人怜花似旧。花比人应瘦。莫凭小栏干。夜深花正寒。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "月", "怀古", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_794", "title": "踏青游", "author": "苏轼", "dynasty": "Song", "form": "踏青游", "content": "□火初晴，绿遍禁池芳草。斗锦绣、火城驰道。踏青游，拾翠惜，袜罗弓小。莲步袅。腰支佩兰轻妙。行过上林春好。今困天涯，何限旧情相恼。念摇落、玉京寒早。任刘郎、目断蓬山难到。仙梦杳。良宵又过了。楼台万家清晓。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "山水", "怀古", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_795", "title": "阮郎归", "author": "苏轼", "dynasty": "Song", "form": "阮郎归", "content": "歌停檀板舞停鸾。高阳饮兴阑。兽烟喷尽玉壶乾。香分小凤团。雪浪浅，露珠圆。捧瓯春笋寒。绛纱笼下跃金鞍。归时人倚栏。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_796", "title": "西江月", "author": "苏轼", "dynasty": "Song", "form": "西江月", "content": "马趁香微路远，沙笼月淡烟斜。渡波清彻映妍华。倒绿枝寒凤挂。挂凤寒枝绿倒，华妍映彻清波。渡斜烟淡月笼沙。远路微香趁马。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月", "战争"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_797", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "拼沈醉、金荷须满。怕年年此际，催归禁篽，侍黄柑宴。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["思乡", "酒"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_798", "title": "踏莎行", "author": "苏轼", "dynasty": "Song", "form": "踏莎行", "content": "山秀芙蓉，溪明罨画。真游洞穴沧波下。临风慨想斩蛟灵，长桥千载犹横跨。解佩投簪，求田问舍。黄鸡白酒渔樵社。元龙非复少时豪，耳根洗尽功名话。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "酒", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_799", "title": "踏莎行", "author": "苏轼", "dynasty": "Song", "form": "踏莎行", "content": "这个秃奴，修行忒煞。云山顶上空持戒。一从迷恋玉楼人，鹑衣百结浑无奈。毒手伤人，花容粉碎。空空色色今何在。臂间刺道苦相思，这回还了相思债。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_800", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "寂寂珠帘蛛网满。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_801", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "闲卧藤床观社柳。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_802", "title": "定风波", "author": "苏轼", "dynasty": "Song", "form": "定风波", "content": "子瞻书困点新茶。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": [], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_803", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "唤起离情，慵推孤枕。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["送别", "爱情"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_804", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content": "山头望，波光泼眼。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["山水", "隐逸"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_805", "title": "水调歌・水调", "author": "苏轼", "dynasty": "Song", "form": "水调歌・水调", "content": "我歌月徘徊，我舞影凌乱。", "content_modern": "", "year": 0, "year_label": "", "location": "", "occasion": "", "tags": ["月"], "emotion": "", "figures": [], "allusions": [], "related_events": [], "related_poems": [], "source_file": "ci.song.1000.json"}, {"id": "song_ci_ci.song.1000.json_806", "title": "失调名", "author": "苏轼", "dynasty": "Song", "form": "失调名", "content" // ─── 初始化 ───
let allPoems = DATA.poems || [];
let fuse = null;
let currentCat = '全部';
let currentQuery = '';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('poemCount').textContent = allPoems.length;
  initCategories();
  fuse = new Fuse(allPoems, { keys: ['title','content','form'], threshold: 0.4, minMatchCharLength: 1 });
  renderPoems();
});

function initCategories() {
  const forms = {};
  allPoems.forEach(p => { const f = p.form || '其他'; forms[f] = (forms[f]||0)+1; });
  const sorted = Object.entries(forms).sort((a,b) => b[1]-a[1]);
  const container = document.getElementById('categories');
  container.innerHTML = '';
  ['全部'].concat(sorted.map(([f]) => f)).forEach(cat => {
    const btn = document.createElement('span');
    btn.className = 'cat-btn' + (cat === '全部' ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat + (cat !== '全部' ? ` (${forms[cat]})` : '');
    btn.onclick = () => selectCat(cat);
    container.appendChild(btn);
  });
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderPoems();
}

document.getElementById('searchInput').addEventListener('input', () => {
  currentQuery = document.getElementById('searchInput').value.trim();
  renderPoems();
});

function getFiltered() {
  let poems = allPoems;
  if (currentCat !== '全部') poems = poems.filter(p => p.form === currentCat);
  if (currentQuery) poems = fuse.search(currentQuery).map(r => r.item);
  return poems;
}

function renderPoems() {
  const poems = getFiltered();
  document.getElementById('resultCount').textContent = poems.length ? `${poems.length} 首` : '';
  const list = document.getElementById('poemList');
  if (!poems.length) { list.innerHTML = '<div class="empty">无结果</div>'; return; }
  list.innerHTML = poems.slice(0,100).map(p => `
    <div class="poem-card" onclick="openPoem('${p.id}')">
      <div class="card-title">${p.title || '无题'}</div>
      <div class="card-meta">${p.form || '诗'} · ${p.dynasty || '宋'}</div>
      <div class="card-excerpt">${(p.content||'').substring(0,40)}…</div>
      ${p.tags&&p.tags.length ? `<div class="card-tags">${p.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

function openPoem(id) {
  const p = allPoems.find(x => x.id === id);
  if (!p) return;
  document.getElementById('dTitle').textContent = p.title || '无题';
  document.getElementById('dMeta').textContent = `${p.form || '诗'} · ${p.dynasty || '宋'}`;
  document.getElementById('dContent').textContent = p.content || '';
  document.getElementById('dDesc').textContent = p.desc || '暂无赏析';
  document.getElementById('dTags').innerHTML = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('dDescSection').style.display = p.desc ? 'block' : 'none';
  document.getElementById('poemModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('poemModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('poemModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
